# @template
# title: Multi-Turn Conversation
# description: Simulate realistic chatbot workloads with multi-turn context accumulation.
# category: Datasets
# tags: multi-turn, conversation, chatbot
# difficulty: intermediate
# features: multi-turn, turn delay, session tracking
#
# Multi-Turn Conversation Benchmark
# ==================================
# Simulates real chatbot usage: each session has multiple back-and-forth turns,
# with the full conversation history sent on each turn (context grows per turn).
# Turn delays simulate user think time between receiving a response and typing
# the next message.
#
# This stresses KV cache management, context window handling, and connection
# lifecycle — use sticky-user-sessions so each conversation reuses one TCP
# connection (like a real browser session).
#
# Run: aiperf profile --config multi_turn_conversation.yaml

schemaVersion: "2.0"

randomSeed: 42

benchmark:
  model: meta-llama/Llama-3.1-8B-Instruct

  endpoint:
    url: http://localhost:8000/v1/chat/completions
    type: chat
    streaming: true
    timeout: 120.0
  # Each session keeps its own connection, matching browser/app behavior
  # and enabling servers to optimize KV cache locality per connection
    connectionReuse: sticky-user-sessions

  dataset:
    type: synthetic
    entries: 500
    prompts:
      isl: {mean: 200, stddev: 50}    # Per-turn user message length
      osl: {mean: 300, stddev: 75}    # Per-turn assistant response length
    turns: {mean: 5, stddev: 2}       # ~5 turns per conversation (context grows each turn)
    turnDelay: {mean: 2000, stddev: 500}  # 2s average think time between turns (ms)
    turnDelayRatio: 1.0                    # Set < 1 to speed up, > 1 to slow down

  warmup:
    type: concurrency
    sessions: 10
    concurrency: 4

  profiling:
    type: concurrency
    sessions: 100
    concurrency: 20
    duration: 300
    gracePeriod: 120  # Multi-turn sessions can take a while to complete all turns

  artifacts:
    dir: ./artifacts/multi_turn
    summary: [json]
    records: [jsonl]
