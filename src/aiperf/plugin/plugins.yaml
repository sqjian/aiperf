# =============================================================================
# AIPerf Plugin Definitions
# =============================================================================
# This file defines all plugin implementations registered with AIPerf.
# Each plugin belongs to a category (defined in categories.yaml) and specifies:
#   - class: Fully qualified class path (module:ClassName) for the implementation
#   - description: Human-readable description of the plugin's purpose
#   - metadata: (optional) Plugin-specific metadata fields defined by the category's
#               metadata_class schema
#
# Plugins are organized by category and loaded dynamically at runtime.
# Used by the plugin registry to discover and instantiate implementations.
# =============================================================================

schema_version: "1.0"

# =============================================================================
# Services
# =============================================================================
# Services are the core processes that make up the AIPerf distributed system.
# Each service runs in a separate process and communicates via ZMQ message bus.
# =============================================================================
service:
  api:
    class: aiperf.api.api_service:FastAPIService
    description: |
      FastAPI-based API service for exposing benchmark metrics and real-time streaming.
    metadata:
      required: false
      auto_start: false

  dataset_manager:
    class: aiperf.dataset.dataset_manager:DatasetManager
    description: |
      Dataset management service. Handles prompt/token generation, dataset loading
      and composition, conversation sampling, and distribution to timing manager.
    metadata:
      required: true
      auto_start: true

  gpu_telemetry_manager:
    class: aiperf.gpu_telemetry.manager:GPUTelemetryManager
    description: |
      GPU telemetry collection service using DCGM. Monitors GPU metrics
      (utilization, memory, power, temperature) during benchmark execution
      for performance analysis.
    metadata:
      required: false
      auto_start: true

  network_latency_manager:
    class: aiperf.network_latency.manager:NetworkLatencyManager
    description: |
      Network latency calibration service. Probes the endpoint's TCP-handshake
      RTT throughout the profiling phase so the mean network round-trip can be
      subtracted from latency metrics. Only spawned when network latency
      calibration is enabled with active probing (no mean_ms).
    metadata:
      required: false
      auto_start: true

  record_processor:
    class: aiperf.records.record_processor_service:RecordProcessor
    description: |
      Record processing service for metric computation. Scales with load to process
      streaming records and compute per-record and aggregate metrics in a
      distributed manner.
    metadata:
      required: true
      auto_start: false
      replicable: true

  records_manager:
    class: aiperf.records.records_manager:RecordsManager
    description: |
      Record aggregation and results management service. Aggregates metrics from all
      record processors, manages results processors, and coordinates final results
      export.
    metadata:
      required: true
      auto_start: true

  server_metrics_manager:
    class: aiperf.server_metrics.manager:ServerMetricsManager
    description: |
      Server metrics collection service using Prometheus. Monitors server-side
      metrics from inference servers during benchmark execution.
    metadata:
      required: false
      auto_start: true

  system_controller:
    class: aiperf.controller.system_controller:SystemController
    description: |
      System orchestration and lifecycle management service. Coordinates all other
      services, manages benchmark phases (warmup/profiling), and controls overall
      execution flow.
    metadata:
      required: true
      auto_start: false

  timing_manager:
    class: aiperf.timing.manager:TimingManager
    description: |
      Request scheduling and credit issuance service. Controls timing of requests
      using fixed schedule or request rate strategies with credit-based flow control.
    metadata:
      required: true
      auto_start: true
      disable_gc: true

  worker:
    class: aiperf.workers.worker:Worker
    description: |
      Worker service that executes LLM API calls and maintains conversation state.
      Scaled horizontally for throughput. Handles sticky routing for multi-turn
      conversations.
    metadata:
      required: true
      auto_start: false
      disable_gc: true
      replicable: true

  worker_manager:
    class: aiperf.workers.worker_manager:WorkerManager
    description: |
      Worker lifecycle and health monitoring service. Manages worker pool, monitors
      health metrics, handles worker failures, and coordinates worker scaling.
    metadata:
      required: true
      auto_start: true

# =============================================================================
# API Routers
# =============================================================================
# API routers provide HTTP/WebSocket endpoints for the FastAPI service.
# One-to-many mapping: all registered routers are loaded at startup.
# =============================================================================
api_router:
  core:
    class: aiperf.api.routers.core:CoreRouter
    description: Config, health, and readiness endpoints.

  metrics:
    class: aiperf.api.routers.metrics:MetricsRouter
    description: Real-time metrics state and Prometheus/JSON endpoints.

  progress:
    class: aiperf.api.routers.progress:ProgressRouter
    description: Benchmark progress tracking and /api/progress endpoint.

  results:
    class: aiperf.api.routers.results:ResultsRouter
    description: Final benchmark results and artifact file downloads.

  workers:
    class: aiperf.api.routers.workers:WorkersRouter
    description: Worker health tracking and /api/workers endpoint.

# =============================================================================
# Service Managers
# =============================================================================
# Service managers orchestrate how services are launched and managed.
# One-to-one mapping: exactly one service manager is selected based on run_mode.
# =============================================================================
service_manager:
  multiprocessing:
    class: aiperf.controller.multiprocess_service_manager:MultiProcessServiceManager
    description: |
      Multiprocess service manager for single-node deployments. Runs each service
      as a separate process with ZMQ IPC communication for high-performance local
      execution.

# =============================================================================
# Endpoints
# =============================================================================
# Endpoints define how to format requests and parse responses for different APIs.
# One-to-one mapping: exactly one endpoint is selected based on endpoint_type config.
# =============================================================================
endpoint:
  chat:
    class: aiperf.endpoints.openai_chat:ChatEndpoint
    description: |
      OpenAI Chat Completions endpoint. Supports multi-modal inputs (text, images,
      audio, video) and both streaming and non-streaming responses. Uses
      /v1/chat/completions path.
    metadata:
      endpoint_path: /v1/chat/completions
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      supports_audio: true
      supports_images: true
      supports_videos: true
      metrics_title: LLM Metrics

  cohere_rankings:
    class: aiperf.endpoints.cohere_rankings:CohereRankingsEndpoint
    description: |
      Cohere Rankings endpoint. Provides document ranking capabilities using
      Cohere's reranking API.
    metadata:
      endpoint_path: /v2/rerank
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      metrics_title: Ranking Metrics

  completions:
    class: aiperf.endpoints.openai_completions:CompletionsEndpoint
    description: |
      OpenAI Completions endpoint. Supports text completions with streaming for
      legacy completion-based models. Uses /v1/completions path.
    metadata:
      endpoint_path: /v1/completions
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      metrics_title: LLM Metrics

  responses:
    class: aiperf.endpoints.openai_responses:ResponsesEndpoint
    description: |
      OpenAI Responses API endpoint. Supports multi-modal inputs (text, images,
      audio) and both streaming and non-streaming responses. Uses
      /v1/responses path.
    metadata:
      endpoint_path: /v1/responses
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      supports_images: true
      supports_audio: true
      metrics_title: LLM Metrics

  chat_embeddings:
    class: aiperf.endpoints.chat_embeddings:ChatEmbeddingsEndpoint
    description: |
      Chat-style embeddings endpoint for vLLM multimodal embedding models (e.g., VLM2Vec).
      This is required for vLLM as it is the only way to obtain multimodal embeddings -
      the request uses chat messages format (with images/text) while the response returns
      embeddings. Uses /v1/embeddings path.
    metadata:
      endpoint_path: /v1/embeddings
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      supports_images: true
      metrics_title: Embeddings Metrics

  embeddings:
    class: aiperf.endpoints.openai_embeddings:EmbeddingsEndpoint
    description: |
      OpenAI Embeddings endpoint. Generates vector embeddings for text inputs using
      embedding models. Uses /v1/embeddings path. Non-streaming only.
    metadata:
      endpoint_path: /v1/embeddings
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      metrics_title: Embeddings Metrics

  hf_tei_rankings:
    class: aiperf.endpoints.hf_tei_rankings:HFTeiRankingsEndpoint
    description: |
      Hugging Face TEI (Text Embeddings Inference) Rankings endpoint. Provides
      ranking using TEI reranking models.
    metadata:
      endpoint_path: /rerank
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      metrics_title: Ranking Metrics

  huggingface_generate:
    class: aiperf.endpoints.huggingface_generate:HuggingFaceGenerateEndpoint
    description: |
      Hugging Face TGI (Text Generation Inference) endpoint. Supports both streaming
      (/generate_stream) and non-streaming (/generate) text generation.
    metadata:
      endpoint_path: /generate
      streaming_path: /generate_stream
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      metrics_title: LLM Metrics

  image_generation:
    class: aiperf.endpoints.openai_image_generation:ImageGenerationEndpoint
    description: |
      OpenAI Image Generation endpoint. Generates images from text prompts using
      models like DALL-E. Supports streaming responses. Uses /v1/images/generations
      path.
    metadata:
      endpoint_path: /v1/images/generations
      supports_streaming: true
      produces_tokens: false
      produces_images: true
      tokenizes_input: true
      metrics_title: Image Generation Metrics

  image_edit:
    class: aiperf.endpoints.openai_image_edit:ImageEditEndpoint
    description: |
      OpenAI Image Edit (image-to-image) endpoint. Edits an input image using
      a text prompt. Compatible with SGLang's /v1/images/edits and FLUX.2
      unified diffusion serving. Uses multipart/form-data request encoding
      because the input image is uploaded as a file field. Use
      --endpoint-type image_edit.
    metadata:
      endpoint_path: /v1/images/edits
      supports_streaming: false
      produces_tokens: false
      produces_images: true
      supports_images: true
      tokenizes_input: true
      requires_form_data: true
      metrics_title: Image Edit Metrics

  video_generation:
    class: aiperf.endpoints.openai_video_generation:VideoGenerationEndpoint
    description: |
      OpenAI/SGLang Video Generation endpoint for text-to-video models.
      Supports async generation with polling. Compatible with Sora, Wan2.1,
      HunyuanVideo via SGLang. Use --endpoint-type video_generation.
    metadata:
      endpoint_path: /v1/videos
      supports_streaming: false
      produces_tokens: false
      produces_videos: true
      tokenizes_input: true
      requires_polling: true
      requires_form_data: true
      metrics_title: Video Generation Metrics

  image_retrieval:
    class: aiperf.endpoints.nim_image_retrieval:ImageRetrievalEndpoint
    description: |
      NIM Image Retrieval endpoint. Sends images to NIM-based image inference
      services for retrieval tasks such as bounding box detection. Uses /v1/infer path.
    metadata:
      endpoint_path: /v1/infer
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: false
      supports_images: true
      requires_inline_media: true
      metrics_title: Image Retrieval Metrics

  nim_embeddings:
    class: aiperf.endpoints.nim_embeddings:NIMEmbeddingsEndpoint
    description: |
      NVIDIA NIM Embeddings endpoint. Generates vector embeddings for text and/or images using
      NIM's embeddings API. Uses /v1/embeddings path. Non-streaming only.
    metadata:
      endpoint_path: /v1/embeddings
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      supports_images: true
      metrics_title: NIM Embeddings Metrics

  nim_rankings:
    class: aiperf.endpoints.nim_rankings:NIMRankingsEndpoint
    description: |
      NVIDIA NIM Rankings endpoint. Processes ranking requests by taking a query
      and passages, returning relevance scores. Uses /v1/ranking path.
    metadata:
      endpoint_path: /v1/ranking
      supports_streaming: false
      produces_tokens: false
      tokenizes_input: true
      metrics_title: Rankings Metrics

  solido_rag:
    class: aiperf.endpoints.solido_rag:SolidoEndpoint
    description: |
      Solido RAG endpoint. Custom endpoint for Solido RAG pipeline integration with
      retrieval-augmented generation.
    metadata:
      endpoint_path: /rag/api/prompt
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      metrics_title: SOLIDO RAG Metrics

  raw:
    class: aiperf.endpoints.raw_endpoint:RawEndpoint
    description: |
      Fallback endpoint for non-standard APIs. Does not format payloads or
      append a URL path. Parses responses using auto-detection with optional
      JMESPath extraction via response_field. Prefer a regular endpoint type
      when the target API is supported.
    metadata:
      endpoint_path: null
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      supports_audio: true
      supports_images: true
      supports_videos: true
      metrics_title: LLM Metrics

  template:
    class: aiperf.endpoints.template_endpoint:TemplateEndpoint
    description: |
      Template endpoint for creating custom endpoint implementations. Serves as a
      starting point for plugin developers to implement new API formats.
    metadata:
      endpoint_path: null
      supports_streaming: true
      produces_tokens: true
      tokenizes_input: true
      supports_audio: true
      supports_images: true
      supports_videos: true
      metrics_title: LLM Metrics

# =============================================================================
# Transports
# =============================================================================
# Transports handle the network layer for sending requests to inference servers.
# One-to-one mapping: exactly one transport is selected based on transport_type.
# =============================================================================
transport:
  http:
    class: aiperf.transports.aiohttp_transport:AioHttpTransport
    description: |
      HTTP/1.1 transport implementation using aiohttp.
      Provides high-performance async HTTP client with connection pooling,
      SSE streaming support, automatic error handling, and custom TCP connector configuration.
    metadata:
      transport_type: http
      url_schemes: [http, https]

# =============================================================================
# Dataset Composers
# =============================================================================
# Dataset composers create conversation datasets from various sources.
# One-to-one mapping: exactly one composer is selected based on composer_type config.
# =============================================================================
dataset_composer:
  custom:
    class: aiperf.dataset.composer.custom:CustomDatasetComposer
    description: |
      Custom dataset composer that loads conversations from JSONL files. Supports
      single-turn, multi-turn, random-pool, and mooncake-trace formats with
      automatic format detection.

  synthetic:
    class: aiperf.dataset.composer.synthetic:SyntheticDatasetComposer
    description: |
      Synthetic dataset composer that generates multi-turn conversations with
      synthetic text, image, and audio payloads using configurable distributions.
      Supports variable turn counts and delays.

  synthetic_rankings:
    class: aiperf.dataset.composer.synthetic_rankings:SyntheticRankingsDatasetComposer
    description: |
      Synthetic rankings dataset composer that generates ranking tasks with query
      and passage pairs for ranking model evaluation and benchmarking.

  public:
    class: aiperf.dataset.composer.public:PublicDatasetComposer
    description: |
      Public dataset composer that loads benchmark datasets from remote sources
      (HuggingFace, URLs) using the plugin-registered public dataset loaders.
      Handles metadata-driven loader instantiation and turn finalization.

# =============================================================================
# Custom Dataset Loaders
# =============================================================================
# Custom dataset loaders parse different JSONL file formats into conversations.
# Auto-detection: the custom composer tries loaders in priority order based on can_load().
# =============================================================================
custom_dataset_loader:
  burst_gpt_trace:
    class: aiperf.dataset.loader.burst_gpt:BurstGPTTraceDatasetLoader
    description: |
      BurstGPT real-world bursty LLM traffic trace from Microsoft Research
      (https://github.com/HPMLL/BurstGPT). Each row prescribes request/response
      token counts; session IDs are auto-generated. Prompts are synthesized.
      Usage: --custom-dataset-type burst_gpt_trace --file burst_gpt.csv
    metadata:
      is_trace: true

  bailian_trace:
    class: aiperf.dataset.loader.bailian_trace:BailianTraceDatasetLoader
    description: |
      Alibaba Bailian trace dataset loader for Qwen model serving traces from
      https://github.com/alibaba-edu/qwen-bailian-usagetraces-anon.
      Loads JSONL traces with chat_id, parent_chat_id (-1 for root), timestamp
      (seconds), input/output lengths, turn numbers, and hash_ids for salted
      SipHash block-based prompt caching (block_size=16). Supports multi-turn
      conversation chains and fixed_schedule timing mode.
    metadata:
      is_trace: true
      default_block_size: 16

  mooncake_trace:
    class: aiperf.dataset.loader.mooncake_trace:MooncakeTraceDatasetLoader
    description: |
      Mooncake trace dataset loader for loading Alibaba Mooncake trace format with
      timestamp-based replay support. Designed for fixed_schedule timing mode.
    metadata:
      is_trace: true
      default_block_size: 512

  raw_payload:
    class: aiperf.dataset.loader.raw_payload:RawPayloadDatasetLoader
    description: |
      Raw payload JSONL loader for verbatim API replay. Each line is a
      complete API request body sent directly to the transport with zero
      formatting. Supports single file (one conversation per line) and
      directory mode (one JSONL file per multi-turn conversation).

  inputs_json:
    class: aiperf.dataset.loader.inputs_json:InputsJsonPayloadLoader
    description: |
      Inputs JSON payload loader for verbatim API replay. Loads AIPerf
      InputsFile format with pre-formatted payloads. Preserves multi-turn
      session structure and sends each payload directly to the transport
      without endpoint formatting.

  dag_jsonl:
    class: aiperf.dataset.loader.dag_jsonl:DagJsonlLoader
    description: |
      DAG-shaped benchmark loader. Each JSONL line is a Conversation;
      supports forks: and spawns: shorthand at the turn level; topology
      walk validates and stamps agent_depth and TurnMetadata.has_forks.

  sagemaker_data_capture:
    class: aiperf.dataset.loader.sagemaker_data_capture:SageMakerDataCaptureLoader
    description: |
      Amazon SageMaker Data Capture trace replay loader. Parses JSONL files
      produced by SageMaker real-time endpoint data capture. Replays the exact
      captured prompts (messages) with original timing. Supports directory input
      (recursive globbing of hourly-partitioned capture files).
      Usage: --custom-dataset-type sagemaker_data_capture --input-file ./captured/ --fixed-schedule
    metadata:
      is_trace: true

  multi_turn:
    class: aiperf.dataset.loader.multi_turn:MultiTurnDatasetLoader
    description: |
      Multi-turn dataset loader supporting conversation sessions with turn delays
      and multi-modal content. Enables realistic multi-turn conversation replay
      with session management.

  random_pool:
    class: aiperf.dataset.loader.random_pool:RandomPoolDatasetLoader
    description: |
      Random pool dataset loader that creates conversations by randomly sampling
      from predefined pools of system/user/assistant messages with configurable
      distributions.

  single_turn:
    class: aiperf.dataset.loader.single_turn:SingleTurnDatasetLoader
    description: |
      Single-turn dataset loader supporting multi-modal data and client-side
      batching. Supports text, images, audio with optional timestamps or delays.
      Does NOT support multi-turn features.

  # ---------------------------------------------------------------------------
  # SPEED-Bench: qualitative split (all categories combined)
  # ---------------------------------------------------------------------------
  speed_bench_qualitative:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench qualitative split from HuggingFace (nvidia). 880 prompts across
      11 semantic domains for measuring speculative decoding acceptance rates.

  # ---------------------------------------------------------------------------
  # SPEED-Bench: qualitative split per category (80 prompts each)
  # ---------------------------------------------------------------------------

  speed_bench_coding:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench coding category (80 prompts). Code generation and programming tasks.
    metadata:
      category: coding

  speed_bench_humanities:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench humanities category (80 prompts). History, philosophy, and liberal arts.
    metadata:
      category: humanities

  speed_bench_math:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench math category (80 prompts). Mathematical reasoning and computation.
    metadata:
      category: math

  speed_bench_multilingual:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench multilingual category (80 prompts). Tasks across 23 languages.
    metadata:
      category: multilingual

  speed_bench_qa:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench QA category (80 prompts). Question answering tasks.
    metadata:
      category: qa

  speed_bench_rag:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench RAG category (80 prompts). Retrieval-augmented generation tasks.
    metadata:
      category: rag

  speed_bench_reasoning:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench reasoning category (80 prompts). Logical and analytical reasoning.
    metadata:
      category: reasoning

  speed_bench_roleplay:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench roleplay category (80 prompts). Creative roleplay and dialogue.
    metadata:
      category: roleplay

  speed_bench_stem:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench STEM category (80 prompts). Science, technology, engineering tasks.
    metadata:
      category: stem

  speed_bench_summarization:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench summarization category (80 prompts). Text summarization tasks.
    metadata:
      category: summarization

  speed_bench_writing:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchQualitativeLoader
    description: |
      SPEED-Bench writing category (80 prompts). Creative and technical writing.
    metadata:
      category: writing

  # ---------------------------------------------------------------------------
  # SPEED-Bench: throughput splits (all entropy tiers combined)
  # ---------------------------------------------------------------------------
  speed_bench_throughput_1k:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput1KLoader
    description: |
      SPEED-Bench throughput split at ~1K input tokens from HuggingFace (nvidia).
      1536 prompts across 3 entropy tiers for speculative decoding throughput benchmarking.

  speed_bench_throughput_2k:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput2KLoader
    description: |
      SPEED-Bench throughput split at ~2K input tokens from HuggingFace (nvidia).
      1536 prompts across 3 entropy tiers for speculative decoding throughput benchmarking.

  speed_bench_throughput_8k:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput8KLoader
    description: |
      SPEED-Bench throughput split at ~8K input tokens from HuggingFace (nvidia).
      1536 prompts across 3 entropy tiers for speculative decoding throughput benchmarking.

  speed_bench_throughput_16k:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput16KLoader
    description: |
      SPEED-Bench throughput split at ~16K input tokens from HuggingFace (nvidia).
      1536 prompts across 3 entropy tiers for speculative decoding throughput benchmarking.

  speed_bench_throughput_32k:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput32KLoader
    description: |
      SPEED-Bench throughput split at ~32K input tokens from HuggingFace (nvidia).
      1536 prompts across 3 entropy tiers for speculative decoding throughput benchmarking.

  # ---------------------------------------------------------------------------
  # SPEED-Bench: throughput per entropy tier (512 prompts each per ISL bucket)
  # ---------------------------------------------------------------------------
  speed_bench_throughput_1k_low_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput1KLoader
    description: |
      SPEED-Bench throughput ~1K ISL, low entropy tier (512 prompts). Code and sorting tasks.
    metadata:
      category: low_entropy

  speed_bench_throughput_1k_mixed:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput1KLoader
    description: |
      SPEED-Bench throughput ~1K ISL, mixed entropy tier (512 prompts). Needle-in-a-haystack and exams.
    metadata:
      category: mixed

  speed_bench_throughput_1k_high_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput1KLoader
    description: |
      SPEED-Bench throughput ~1K ISL, high entropy tier (512 prompts). Creative writing and dialogue.
    metadata:
      category: high_entropy

  speed_bench_throughput_2k_low_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput2KLoader
    description: |
      SPEED-Bench throughput ~2K ISL, low entropy tier (512 prompts). Code and sorting tasks.
    metadata:
      category: low_entropy

  speed_bench_throughput_2k_mixed:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput2KLoader
    description: |
      SPEED-Bench throughput ~2K ISL, mixed entropy tier (512 prompts). Needle-in-a-haystack and exams.
    metadata:
      category: mixed

  speed_bench_throughput_2k_high_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput2KLoader
    description: |
      SPEED-Bench throughput ~2K ISL, high entropy tier (512 prompts). Creative writing and dialogue.
    metadata:
      category: high_entropy

  speed_bench_throughput_8k_low_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput8KLoader
    description: |
      SPEED-Bench throughput ~8K ISL, low entropy tier (512 prompts). Code and sorting tasks.
    metadata:
      category: low_entropy

  speed_bench_throughput_8k_mixed:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput8KLoader
    description: |
      SPEED-Bench throughput ~8K ISL, mixed entropy tier (512 prompts). Needle-in-a-haystack and exams.
    metadata:
      category: mixed

  speed_bench_throughput_8k_high_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput8KLoader
    description: |
      SPEED-Bench throughput ~8K ISL, high entropy tier (512 prompts). Creative writing and dialogue.
    metadata:
      category: high_entropy

  speed_bench_throughput_16k_low_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput16KLoader
    description: |
      SPEED-Bench throughput ~16K ISL, low entropy tier (512 prompts). Code and sorting tasks.
    metadata:
      category: low_entropy

  speed_bench_throughput_16k_mixed:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput16KLoader
    description: |
      SPEED-Bench throughput ~16K ISL, mixed entropy tier (512 prompts). Needle-in-a-haystack and exams.
    metadata:
      category: mixed

  speed_bench_throughput_16k_high_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput16KLoader
    description: |
      SPEED-Bench throughput ~16K ISL, high entropy tier (512 prompts). Creative writing and dialogue.
    metadata:
      category: high_entropy

  speed_bench_throughput_32k_low_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput32KLoader
    description: |
      SPEED-Bench throughput ~32K ISL, low entropy tier (512 prompts). Code and sorting tasks.
    metadata:
      category: low_entropy

  speed_bench_throughput_32k_mixed:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput32KLoader
    description: |
      SPEED-Bench throughput ~32K ISL, mixed entropy tier (512 prompts). Needle-in-a-haystack and exams.
    metadata:
      category: mixed

  speed_bench_throughput_32k_high_entropy:
    class: aiperf.dataset.loader.speed_bench:SpeedBenchThroughput32KLoader
    description: |
      SPEED-Bench throughput ~32K ISL, high entropy tier (512 prompts). Creative writing and dialogue.
    metadata:
      category: high_entropy

# =============================================================================
# Dataset Samplers
# =============================================================================
# Dataset samplers control how conversations are selected from the dataset.
# One-to-one mapping: exactly one sampler is selected based on sampling strategy.
# =============================================================================
dataset_sampler:
  random:
    class: aiperf.dataset.dataset_samplers:RandomSampler
    description: |
      Random sampler that randomly selects conversation IDs with replacement. Can
      return the same conversation ID multiple times before seeing all IDs. Uses
      derived RNG for reproducibility.

  sequential:
    class: aiperf.dataset.dataset_samplers:SequentialSampler
    description: |
      Sequential sampler that iterates through conversation IDs in order. When
      reaching the end, wraps around to the beginning indefinitely. Completely
      deterministic with no randomness.

  shuffle:
    class: aiperf.dataset.dataset_samplers:ShuffleSampler
    description: |
      Shuffle sampler that randomly samples without replacement, then repeats.
      Ensures all conversations are seen before any repetition, similar to music
      shuffle. Uses derived RNG for reproducibility.

# =============================================================================
# Dataset Backing Store
# =============================================================================
# Dataset backing stores manage conversation data on the DatasetManager side.
# Provides efficient storage and retrieval for dataset distribution to workers.
# =============================================================================
dataset_backing_store:
  memory_map:
    class: aiperf.dataset.memory_map_utils:MemoryMapDatasetBackingStore
    description: |
      Memory-mapped file backing store for zero-copy worker access. Stores dataset
      in memory-mapped files for efficient sharing across processes.

# =============================================================================
# Dataset Client Store
# =============================================================================
# Dataset client stores read conversation data on the Worker side.
# Provides efficient access to dataset from memory-mapped backing stores.
# =============================================================================
dataset_client_store:
  memory_map:
    class: aiperf.dataset.memory_map_utils:MemoryMapDatasetClientStore
    description: |
      Memory-mapped file client store for zero-copy reads. Reads from memory-mapped
      files with O(1) lookup performance. In Kubernetes mode, WorkerGroupManager
      downloads the dataset once per pod and workers use local mmap access.

# =============================================================================
# Timing Strategies
# =============================================================================
# Timing strategies control request scheduling and credit issuance.
# Determines when requests are sent based on fixed schedules, request rates,
# or user-centric patterns. One-to-one mapping per benchmark phase.
# =============================================================================
timing_strategy:
  fixed_schedule:
    class: aiperf.timing.strategies.fixed_schedule:FixedScheduleStrategy
    description: |
      A mode where the TimingManager will send requests according to a fixed schedule.
      Requests are sent at exact timestamps defined in the dataset.
      Useful for trace replay or exact timing requirements.

  request_rate:
    class: aiperf.timing.strategies.request_rate:RequestRateStrategy
    description: |
      A mode where the TimingManager will send requests using a request rate generator based on various modes.
      Optionally, a max concurrency limit can be specified as well.

  user_centric_rate:
    class: aiperf.timing.strategies.user_centric_rate:UserCentricStrategy
    description: |
      A mode where each session acts as a separate user with gap = num_users / request_rate between turns.
      Users block on their previous turn (no interleaving within a user).
      Matches LMBenchmark behavior for KV cache benchmarking.

# =============================================================================
# Arrival Pattern (Interval Generators)
# =============================================================================
# Interval generators determine inter-arrival times for request rate strategy.
# One-to-one mapping: exactly one generator is selected based on arrival_pattern.
# =============================================================================
arrival_pattern:
  concurrency_burst:
    class: aiperf.timing.intervals:ConcurrencyBurstIntervalGenerator
    description: |
      Generate intervals as soon as possible, up to a max concurrency limit.
      Only allowed when a request rate is not specified.
      Useful for saturation/throughput testing.

  constant:
    class: aiperf.timing.intervals:ConstantIntervalGenerator
    description: |
      Generate intervals at a constant rate.
      Useful for controlled request rate testing.

  gamma:
    class: aiperf.timing.intervals:GammaIntervalGenerator
    description: |
      Generate intervals using a gamma distribution with tunable smoothness.
      Use --arrival-smoothness to control the shape parameter:
      - smoothness = 1.0: Equivalent to Poisson (exponential inter-arrivals)
      - smoothness < 1.0: More bursty/clustered arrivals
      - smoothness > 1.0: More regular/smooth arrivals

  poisson:
    class: aiperf.timing.intervals:PoissonIntervalGenerator
    description: |
      Generate intervals using a poisson process.
      Useful for realistic traffic patterns.

# =============================================================================
# Ramp (Ramp Strategies)
# =============================================================================
# Ramp strategies control how values are gradually transitioned over time.
# Used for ramping concurrency limits, request rates, and other numeric parameters.
# =============================================================================
ramp:
  exponential:
    class: aiperf.timing.ramping:ExponentialStrategy
    description: |
      Exponential ease-in ramp strategy. Starts slow and accelerates toward target,
      providing gradual warmup before full load.

  linear:
    class: aiperf.timing.ramping:LinearStrategy
    description: |
      Linear ramp strategy with configurable step size. Steps at evenly spaced intervals
      for predictable, uniform value transitions.

  poisson:
    class: aiperf.timing.ramping:PoissonStrategy
    description: |
      Poisson ramp strategy with exponentially-distributed intervals.
      Provides stochastic burstiness while guaranteeing completion within duration.

# =============================================================================
# Record Processors
# =============================================================================
# Record processors stream records and compute metrics in a distributed manner.
# One-to-many mapping: multiple processors can be loaded simultaneously.
# =============================================================================
record_processor:
  metric_record:
    class: aiperf.post_processors.metric_record_processor:MetricRecordProcessor
    description: |
      Streaming record processor that computes metrics from MetricType.RECORD and
      MetricType.AGGREGATE. First stage of distributed processing pipeline.
      Always loaded.

  raw_record_writer:
    class: aiperf.post_processors.raw_record_writer_processor:RawRecordWriterProcessor
    description: |
      Raw record writer that streams raw request/response data to JSONL files
      for detailed analysis and debugging. Enabled when export_level is RAW.

  accuracy_record:
    class: aiperf.accuracy.accuracy_record_processor:AccuracyRecordProcessor
    description: |
      Accuracy record processor that grades LLM responses against ground truth
      for accuracy benchmarking. Self-disables when accuracy mode is off.

  outputs_json:
    class: aiperf.post_processors.outputs_json_record_processor:OutputsJsonRecordProcessor
    description: |
      Outputs JSON record processor that captures model response text per request.
      Enabled when --export-outputs-json is set. Writes per-processor fragment files.

# =============================================================================
# Results Processors
# =============================================================================
# Results processors aggregate results from record processors and compute derived metrics.
# One-to-many mapping: multiple processors can be loaded simultaneously.
# =============================================================================
results_processor:
  gpu_telemetry_accumulator:
    class: aiperf.gpu_telemetry.accumulator:GPUTelemetryAccumulator
    description: |
      GPU telemetry accumulator that aggregates GPU telemetry records and computes
      metrics in a hierarchical structure. Loaded when telemetry is enabled.

  gpu_telemetry_jsonl_writer:
    class: aiperf.gpu_telemetry.jsonl_writer:GPUTelemetryJSONLWriter
    description: |
      GPU telemetry JSONL writer that exports per-record GPU telemetry data to
      JSONL files as it arrives from GPUTelemetryManager. Enabled with telemetry
      export config.

  metric_results:
    class: aiperf.post_processors.metric_results_processor:MetricResultsProcessor
    description: |
      Results processor that computes metrics from MetricType.DERIVED and
      aggregates results from all record processors. Final stage of metrics
      pipeline. Always loaded.

  network_latency_jsonl_writer:
    class: aiperf.network_latency.jsonl_writer:NetworkLatencyJSONLWriter
    description: |
      Network latency JSONL writer that exports per-sample TCP-handshake RTT
      probes to a JSONL file. Enabled when network latency calibration is
      actively probing (no mean_ms).

  otel_metrics_streamer:
    class: aiperf.post_processors.otel_metrics_results_processor:OTelMetricsResultsProcessor
    description: |
      Streams per-record metrics to a user-provided OpenTelemetry collector
      with periodic export.
      Enabled when --otel-url is configured.

  record_export:
    class: aiperf.post_processors.record_export_results_processor:RecordExportResultsProcessor
    description: |
      Record export processor that writes per-record metrics to JSONL files with
      display unit conversion and filtering. Enabled when export_level is RECORDS.

  server_metrics_accumulator:
    class: aiperf.server_metrics.accumulator:ServerMetricsAccumulator
    description: |
      Server metrics accumulator that aggregates Prometheus server metrics records
      and computes summary statistics. Supports Gauge, Counter, and Histogram metrics.

  server_metrics_jsonl_writer:
    class: aiperf.server_metrics.jsonl_writer:ServerMetricsJSONLWriter
    description: |
      Server metrics JSONL writer that exports per-record server metrics data to
      JSONL files in slim format.

  timeslice:
    class: aiperf.post_processors.timeslice_metric_results_processor:TimesliceMetricResultsProcessor
    description: |
      Timeslice results processor that computes metrics for user-configurable
      time slices, enabling time-series analysis of benchmark performance.
      Enabled when timeslice config is set.

  accuracy_results:
    class: aiperf.accuracy.accuracy_results_processor:AccuracyResultsProcessor
    description: |
      Accuracy results processor that aggregates grading results and computes
      summary accuracy metrics. Self-disables when accuracy mode is off.

# =============================================================================
# GPU Telemetry Processors
# =============================================================================
# GPU telemetry processors aggregate and export GPU telemetry records locally
# within GPUTelemetryManager. One-to-many mapping.
# =============================================================================
gpu_telemetry_processor:
  gpu_telemetry_accumulator:
    class: aiperf.gpu_telemetry.accumulator:GPUTelemetryAccumulator
    description: |
      GPU telemetry accumulator that aggregates GPU telemetry records and computes
      metrics in a hierarchical structure. Loaded when telemetry is enabled.

  gpu_telemetry_jsonl_writer:
    class: aiperf.gpu_telemetry.jsonl_writer:GPUTelemetryJSONLWriter
    description: |
      GPU telemetry JSONL writer that exports per-record GPU telemetry data to
      JSONL files as it arrives from GPUTelemetryManager. Enabled with telemetry
      export config.

# =============================================================================
# Server Metrics Processors
# =============================================================================
# Server metrics processors aggregate and export Prometheus server metrics
# records locally within ServerMetricsManager. One-to-many mapping.
# =============================================================================
server_metrics_processor:
  server_metrics_accumulator:
    class: aiperf.server_metrics.accumulator:ServerMetricsAccumulator
    description: |
      Server metrics accumulator that aggregates Prometheus server metrics records
      and computes summary statistics. Supports Gauge, Counter, and Histogram metrics.

  server_metrics_jsonl_writer:
    class: aiperf.server_metrics.jsonl_writer:ServerMetricsJSONLWriter
    description: |
      Server metrics JSONL writer that exports per-record server metrics data to
      JSONL files in slim format.

# =============================================================================
# Artifact Publishers
# =============================================================================
# Artifact publishers upload exported benchmark files to remote storage backends.
# One-to-many mapping: multiple publishers can be loaded simultaneously.
# =============================================================================
# artifact_publisher:

# =============================================================================
# Data Exporters
# =============================================================================
# Data exporters write benchmark results to files in various formats.
# One-to-many mapping: multiple exporters can be loaded simultaneously.
# =============================================================================
data_exporter:
  csv:
    class: aiperf.exporters.metrics_csv_exporter:MetricsCsvExporter
    description: |
      CSV exporter for aggregated metrics. Exports benchmark results to CSV format
      for spreadsheet analysis and data processing. Always loaded.

  json:
    class: aiperf.exporters.metrics_json_exporter:MetricsJsonExporter
    description: |
      JSON exporter for aggregated metrics. Exports benchmark results to JSON
      format with full metric details and structured data. Always loaded.

  mlflow:
    class: aiperf.exporters.mlflow_data_exporter:MLflowDataExporter
    description: |
      MLflow post-run exporter that uploads benchmark params, metrics, tags,
      and generated artifacts (including plots) to an MLflow Tracking server.
      Enabled when --mlflow-tracking-uri is configured.

  wandb:
    class: aiperf.exporters.wandb_data_exporter:WandbDataExporter
    description: |
      Weights & Biases post-run exporter that uploads benchmark config, metrics,
      tags, and generated artifacts to a wandb project.
      Enabled when --wandb-project is configured.

  raw_record_aggregator:
    class: aiperf.post_processors.raw_record_writer_processor:RawRecordAggregator
    description: |
      Raw record aggregator that consolidates raw JSONL files from multiple
      record processors into final output files. Enabled when export_level is RAW.

  server_metrics_csv:
    class: aiperf.server_metrics.csv_exporter:ServerMetricsCsvExporter
    description: |
      CSV exporter for server metrics. Exports Prometheus server metrics to CSV
      format for spreadsheet analysis.

  server_metrics_json:
    class: aiperf.server_metrics.json_exporter:ServerMetricsJsonExporter
    description: |
      JSON exporter for server metrics. Exports Prometheus server metrics to JSON
      format with full metric details.

  server_metrics_parquet:
    class: aiperf.server_metrics.parquet_exporter:ServerMetricsParquetExporter
    description: |
      Parquet exporter for server metrics. Exports Prometheus server metrics to
      Parquet format for efficient columnar storage and analysis.

  timeslice_csv:
    class: aiperf.exporters.timeslice_metrics_csv_exporter:TimesliceMetricsCsvExporter
    description: |
      CSV exporter for timeslice metrics. Exports time-series metric data to CSV
      format for spreadsheet analysis and plotting.

  timeslice_json:
    class: aiperf.exporters.timeslice_metrics_json_exporter:TimesliceMetricsJsonExporter
    description: |
      JSON exporter for timeslice metrics. Exports time-series metric data to JSON
      format for temporal analysis and visualization.

  accuracy_csv:
    class: aiperf.accuracy.accuracy_data_exporter:AccuracyDataExporter
    description: |
      CSV exporter for accuracy benchmarking results. Exports per-problem grading
      details for offline analysis. Self-disables when accuracy mode is off.

  outputs_json:
    class: aiperf.exporters.outputs_json_exporter:OutputsJsonExporter
    description: |
      Aggregates per-processor output fragment files and merges with metrics
      into final outputs.json. Enabled when --export-outputs-json is set.

# =============================================================================
# Console Exporters
# =============================================================================
# Console exporters display benchmark results and diagnostics to stdout.
# One-to-many mapping: multiple console exporters can be loaded simultaneously.
# =============================================================================
console_exporter:
  api_errors:
    class: aiperf.exporters.console_api_error_exporter:ConsoleApiErrorExporter
    description: |
      Console exporter for API error details. Displays detailed error information
      for API request failures with grouped error analysis.

  errors:
    class: aiperf.exporters.console_error_exporter:ConsoleErrorExporter
    description: |
      Console exporter for error summary. Displays error counts and details to
      help diagnose failures during benchmark execution. Always loaded.

  experimental_metrics:
    class: aiperf.exporters.experimental_metrics_console_exporter:ConsoleExperimentalMetricsExporter
    description: |
      Console exporter for experimental metrics. Displays metrics under development
      or evaluation that may change in future releases. Not loaded by default.

  http_trace:
    class: aiperf.exporters.http_trace_console_exporter:HttpTraceConsoleExporter
    description: |
      Console exporter for HTTP trace information. Displays detailed HTTP
      request/response traces for debugging network issues.

  internal_metrics:
    class: aiperf.exporters.internal_metrics_console_exporter:ConsoleInternalMetricsExporter
    description: |
      Console exporter for internal system metrics. Displays AIPerf framework
      performance metrics for debugging and optimization. Loaded by default.

  metrics:
    class: aiperf.exporters.console_metrics_exporter:ConsoleMetricsExporter
    description: |
      Console exporter for primary benchmark metrics. Displays formatted metric
      tables to stdout for user-facing results. Always loaded.

  telemetry:
    class: aiperf.exporters.gpu_telemetry_console_exporter:GPUTelemetryConsoleExporter
    description: |
      Console exporter for GPU telemetry metrics. Displays GPU utilization,
      memory, power, and temperature metrics to stdout. Loaded when telemetry
      is enabled.

  usage_discrepancy_warning:
    class: aiperf.exporters.console_usage_discrepancy_exporter:ConsoleUsageDiscrepancyExporter
    description: |
      Console exporter for usage discrepancy warnings. Alerts when token counts
      from server differ significantly from client calculations. Always loaded.

  osl_mismatch_warning:
    class: aiperf.exporters.console_osl_mismatch_exporter:ConsoleOSLMismatchExporter
    description: |
      Console exporter for output sequence length mismatch warnings. Alerts when
      actual output length differs significantly from requested --osl value.
      Typically indicates ignore_eos is not set or not supported by the server.

  accuracy:
    class: aiperf.accuracy.accuracy_console_exporter:AccuracyConsoleExporter
    description: |
      Console exporter for accuracy benchmarking results. Displays accuracy scores,
      per-task breakdown, and grading details. Self-disables when accuracy mode is off.

# =============================================================================
# UI Implementations
# =============================================================================
# UI implementations provide progress tracking and visualization during benchmark execution.
# One-to-one mapping: exactly one UI is selected based on ui config.
# =============================================================================
ui:
  dashboard:
    class: aiperf.ui.dashboard.aiperf_dashboard_ui:AIPerfDashboardUI
    description: |
      Rich terminal dashboard UI with real-time progress tracking, metric updates,
      and visual components using Textual framework. Provides interactive TUI
      experience.

  none:
    class: aiperf.ui.no_ui:NoUI
    description: |
      No-op UI implementation. Disables all UI output for headless execution,
      automation scripts, or when output is not desired.

  simple:
    class: aiperf.ui.tqdm_ui:TQDMProgressUI
    description: |
      Simple progress bar UI using tqdm. Provides lightweight progress tracking
      suitable for simple terminals and logs with minimal resource overhead.

# =============================================================================
# URL Selection Strategies
# =============================================================================
# URL selection strategies control how requests are distributed across multiple endpoints.
# One-to-one mapping: exactly one strategy is selected based on url_selection_strategy.
# =============================================================================
url_selection_strategy:
  round_robin:
    class: aiperf.timing.url_samplers:RoundRobinURLSampler
    description: |
      Round-robin URL sampler for even distribution across endpoints.
      Distributes requests evenly across URLs in sequential order.
      Each call to next_url_index() returns the next URL index in the list, wrapping around
      when the end is reached.

# =============================================================================
# Plot
# =============================================================================
# Plot handlers create different types of visualizations from benchmark data.
# One-to-one mapping: exactly one handler is selected based on plot type.
# =============================================================================
plot:
  area:
    class: aiperf.plot.handlers.single_run_handlers:AreaHandler
    description: Filled area showing token throughput distribution.
    metadata:
      display_name: Throughput Over Time
      category: combined

  dual_axis:
    class: aiperf.plot.handlers.single_run_handlers:DualAxisHandler
    description: Two metrics on separate Y-axes (e.g., throughput + GPU util).
    metadata:
      display_name: Dual Metric Overlay
      category: combined

  histogram:
    class: aiperf.plot.handlers.single_run_handlers:HistogramHandler
    description: Bar chart of aggregated values per time window.
    metadata:
      display_name: Time Window Bars
      category: aggregated

  pareto:
    class: aiperf.plot.handlers.multi_run_handlers:ParetoHandler
    description: Trade-off frontier showing optimal configurations.
    metadata:
      display_name: Pareto Curve
      category: comparison

  percentile_bands:
    class: aiperf.plot.handlers.single_run_handlers:PercentileBandsHandler
    description: p50 line with p95/p99 shaded uncertainty bands for SLA monitoring.
    metadata:
      display_name: Percentile Bands Over Time
      category: aggregated

  request_timeline:
    class: aiperf.plot.handlers.single_run_handlers:RequestTimelineHandler
    description: Gantt-style view showing TTFT vs generation time per request.
    metadata:
      display_name: Request Phase Breakdown
      category: per_request

  scatter:
    class: aiperf.plot.handlers.single_run_handlers:ScatterHandler
    description: Individual data points for each request.
    metadata:
      display_name: Per-Request Scatter
      category: per_request

  scatter_line:
    class: aiperf.plot.handlers.multi_run_handlers:ScatterLineHandler
    description: Points connected by lines, grouped by configuration.
    metadata:
      display_name: Scatter + Trend Line
      category: comparison

  scatter_with_percentiles:
    class: aiperf.plot.handlers.single_run_handlers:ScatterWithPercentilesHandler
    description: Per-request points with rolling p50/p95/p99 trend lines.
    metadata:
      display_name: Scatter with Trends
      category: per_request

  timeslice:
    class: aiperf.plot.handlers.single_run_handlers:TimeSliceHandler
    description: Aggregated averages per time window (e.g., every 10s).
    metadata:
      display_name: Time Window Summary
      category: aggregated

  latency_throughput_uncertainty:
    class: aiperf.plot.handlers.multi_run_handlers:LatencyThroughputUncertaintyHandler
    description: Latency vs throughput with crosshair error bars and confidence ellipses.
    metadata:
      display_name: Uncertainty Scatter
      category: comparison

# =============================================================================
# GPU Telemetry Collector
# =============================================================================
# GPU telemetry collectors gather GPU metrics from various sources and deliver them via callbacks.
# Supports DCGM HTTP endpoints and plugin-defined local collectors.
# One-to-one mapping based on gpu_telemetry_collector configuration.
# =============================================================================
gpu_telemetry_collector:
  dcgm:
    class: aiperf.gpu_telemetry.dcgm_collector:DCGMTelemetryCollector
    description: |
      DCGM telemetry collector that collects GPU telemetry metrics from DCGM HTTP endpoints.
  pynvml:
    class: aiperf.gpu_telemetry.pynvml_collector:PyNVMLTelemetryCollector
    description: |
      PyNVML telemetry collector that collects GPU telemetry metrics using the pynvml Python library.
    metadata:
      is_local: true
  amdsmi:
    class: aiperf.gpu_telemetry.amdsmi_collector:AMDSMITelemetryCollector
    description: |
      AMDSMI telemetry collector for AMD ROCm GPUs (Instinct MI300X, MI355X, etc.).
      Uses the amdsmi Python library shipped with ROCm.
    metadata:
      is_local: true

# =============================================================================
# Accuracy Graders
# =============================================================================
# Accuracy graders evaluate LLM responses against ground truth answers.
# One-to-one mapping based on grader configuration or benchmark default.
# =============================================================================
accuracy_grader:
  exact_match:
    class: aiperf.accuracy.graders.exact_match:ExactMatchGrader
    description: |
      Strict ``pred.strip() == gold.strip()`` grader matching DeepEval's
      ``Scorer.exact_match_score``. Used by HellaSwag and BigBench-Hard for
      trt-llm reference parity (case-sensitive, no normalization).

  math:
    class: aiperf.accuracy.graders.math:MathGrader
    description: |
      Math grader that evaluates mathematical expressions for equivalence.
      Handles symbolic comparison, numeric tolerance, and expression normalization.

  multiple_choice:
    class: aiperf.accuracy.graders.multiple_choice:MultipleChoiceGrader
    description: |
      Multiple choice grader that matches selected choice labels (A/B/C/D)
      against ground truth. Supports various answer extraction patterns.

  code_execution:
    class: aiperf.accuracy.graders.code_execution:CodeExecutionGrader
    description: |
      Code execution grader for LiveCodeBench, backed by lighteval's
      ``lcb_codegen_metric``. Extracts the model's code block, executes it
      against public + private test cases in sandboxed subprocesses, and
      reports pass@1. Requires the ``[accuracy]`` install.

  lighteval_expr:
    class: aiperf.accuracy.graders.lighteval_grader:LightevalExprGrader
    description: |
      Lighteval ``expr_gold_metric`` — used by AIME24/AIME25. Wraps lighteval's
      ``MultilingualExtractiveMatchMetric`` configured with
      ``ExprExtractionConfig`` for gold and
      ``(ExprExtractionConfig, LatexExtractionConfig(boxed_match_priority=0))``
      for predictions, matching the trt-llm benchmark recipe's
      ``acc_bench_lighteval.py`` definition.

  lighteval_latex:
    class: aiperf.accuracy.graders.lighteval_grader:LightevalLatexGrader
    description: |
      Lighteval ``latex_gold_metric`` — used by MATH-500. Same as
      ``lighteval_expr`` but the gold extractor uses
      ``LatexExtractionConfig`` since MATH-500 gold answers are LaTeX
      snippets like ``\\frac{1}{3}``.

  lighteval_gpqa:
    class: aiperf.accuracy.graders.lighteval_grader:LightevalGPQAGrader
    description: |
      Lighteval ``gpqa_metric`` — used by GPQA-Diamond. Extracts via
      ``IndicesExtractionConfig(prefix_for_extraction="NativeLetters")``
      to find the chosen A/B/C/D letter in both gold and prediction.

  lighteval_gsm8k:
    class: aiperf.accuracy.graders.gsm8k_grader:LightevalGSM8KGrader
    description: |
      Lighteval ``quasi_exact_match_gsm8k`` grader — used by GSM8K. Extracts
      the number after "####" from the gold answer using gsm8k_normalizer,
      and extracts the last number from the model prediction (preferring a
      "####" marker when present). Compares numerically so "24" and "24.0"
      match. Pure-regex; no lighteval install required.

# =============================================================================
# Accuracy Benchmarks
# =============================================================================
# Accuracy benchmarks provide standardized problem sets for evaluating LLM correctness.
# One-to-one mapping based on accuracy benchmark configuration.
# =============================================================================
accuracy_benchmark:
  mmlu:
    class: aiperf.accuracy.benchmarks.mmlu:MMLUBenchmark
    description: |
      MMLU (Massive Multitask Language Understanding) benchmark covering 57 subjects
      across STEM, humanities, social sciences, and more.
    metadata:
      default_grader: multiple_choice
      default_n_shots: 5

  aime:
    class: aiperf.accuracy.benchmarks.aime:AIMEBenchmark
    description: |
      AIME (American Invitational Mathematics Examination) benchmark for
      advanced high school mathematics problems. Aligned with the trt-llm
      benchmark recipe's DeepEval-backed AIME path: same dataset
      (Maxwell-Jia/AIME_2024), same prompt template, same default n_shots
      (8) and chain-of-thought (on), same default system prompt.
    metadata:
      default_grader: math
      default_n_shots: 8
      default_enable_cot: true
      default_system_prompt: "Please reason step by step, and put your final answer within \\boxed{}."

  hellaswag:
    class: aiperf.accuracy.benchmarks.hellaswag:HellaSwagBenchmark
    description: |
      HellaSwag commonsense reasoning benchmark, aligned with the trt-llm
      benchmark recipe's DeepEval-backed configuration. Prompts are byte-equal
      to ``deepeval.benchmarks.HellaSwag`` (n_shots=10, one few-shot per unique
      activity_label). Pairs with ``exact_match`` for the recipe's strict
      ``Scorer.exact_match_score`` semantics. Requires the ``[accuracy]``
      install (deepeval ships the prompt template).
    metadata:
      default_grader: exact_match
      default_n_shots: 10

  bigbench:
    class: aiperf.accuracy.benchmarks.bigbench:BigBenchBenchmark
    description: |
      BigBench-Hard benchmark, aligned with the trt-llm benchmark recipe's
      DeepEval-backed configuration. Prompts are byte-equal to
      ``deepeval.benchmarks.BigBenchHard`` (n_shots=3, enable_cot=True,
      using DeepEval's bundled per-subtask CoT prompt files). Pairs with
      ``exact_match`` for the recipe's strict ``Scorer.exact_match_score``
      semantics. Requires the ``[accuracy]`` install (deepeval ships the
      27 canonical prompt files).
    metadata:
      default_grader: exact_match
      default_n_shots: 3
      default_enable_cot: true

  aime24:
    class: aiperf.accuracy.benchmarks.aime24:AIME24Benchmark
    description: |
      AIME 2024 benchmark, aligned with the trt-llm benchmark recipe's
      lighteval-backed configuration (HuggingFaceH4/aime_2024 + lighteval
      ``expr_gold_metric``).
    metadata:
      default_grader: lighteval_expr
      default_n_shots: 0

  aime25:
    class: aiperf.accuracy.benchmarks.aime25:AIME25Benchmark
    description: |
      AIME 2025 benchmark, aligned with the trt-llm benchmark recipe's
      lighteval-backed configuration (yentinglin/aime_2025 + lighteval
      ``expr_gold_metric``).
    metadata:
      default_grader: lighteval_expr
      default_n_shots: 0

  math_500:
    class: aiperf.accuracy.benchmarks.math_500:Math500Benchmark
    description: |
      MATH-500 benchmark, aligned with the trt-llm benchmark recipe's
      lighteval-backed configuration (HuggingFaceH4/MATH-500 + lighteval
      ``latex_gold_metric``). Gold is the full ``solution`` text;
      ``LightevalLatexGrader`` extracts the boxed expression at grade time.
    metadata:
      default_grader: lighteval_latex
      default_n_shots: 0

  gsm8k:
    class: aiperf.accuracy.benchmarks.gsm8k:GSM8KBenchmark
    description: |
      GSM8K (Grade School Math 8K) benchmark. Grade-school math word
      problems requiring multi-step reasoning. Aligned with lighteval's
      ``gsm8k_leaderboard`` task config (gsm8k/main test split, prompt
      ``"Question: {question}\nAnswer:"``, ``generation_size=256``).
      Gold is the raw ``answer`` field ending in ``#### <number>``;
      ``LightevalGSM8KGrader`` extracts the number at grade time.
    metadata:
      default_grader: lighteval_gsm8k
      default_n_shots: 0

  gpqa_diamond:
    class: aiperf.accuracy.benchmarks.gpqa_diamond:GPQADiamondBenchmark
    description: |
      GPQA Diamond benchmark, aligned with the trt-llm benchmark recipe's
      lighteval-backed configuration (Idavidrein/gpqa subset gpqa_diamond
      + lighteval ``gpqa_metric``). Uses the simple-evals prompt template
      with SHA-256-seeded deterministic A/B/C/D shuffling so gold
      positions are reproducible across runs.
    metadata:
      default_grader: lighteval_gpqa
      default_n_shots: 0

  lcb_codegeneration:
    class: aiperf.accuracy.benchmarks.lcb_codegeneration:LCBCodeGenerationBenchmark
    description: |
      LiveCodeBench code generation benchmark, aligned with the trt-llm
      benchmark recipe's lighteval-backed configuration
      (livecodebench/code_generation_lite + lighteval ``codegen_metrics``).
      Serializes the LCB-style test-case payload (starter_code,
      public_test_cases, private_test_cases, upstream metadata) into
      ``BenchmarkProblem.ground_truth`` as an orjson blob so
      ``CodeExecutionGrader`` can run the generated code against the
      bundled public + private test cases.
    metadata:
      default_grader: code_execution
      default_n_shots: 0

# =============================================================================
# Communication Backends
# =============================================================================
# Communication backends provide the underlying transport for inter-service messaging.
# One-to-one mapping: exactly one communication backend is selected based on deployment.
# =============================================================================
communication:
  zmq_dual_bind:
    class: aiperf.zmq.zmq_comms:ZMQDualBindCommunication
    description: |
      ZMQ dual-bind communication backend for Kubernetes deployments. Provides
      high-performance message passing over both IPC and TCP for both local and remote communication.

  zmq_ipc:
    class: aiperf.zmq.zmq_comms:ZMQIPCCommunication
    description: |
      ZMQ IPC communication backend for single-node deployments. Provides
      high-performance message passing over Unix domain sockets for same-machine
      communication.

  zmq_tcp:
    class: aiperf.zmq.zmq_comms:ZMQTCPCommunication
    description: |
      ZMQ TCP communication backend for distributed multi-node deployments. Provides
      reliable message passing over TCP sockets for cross-machine communication.

# =============================================================================
# Communication Clients
# =============================================================================
# Communication clients implement different ZMQ socket patterns for messaging.
# Internal infrastructure: automatically created by framework based on usage patterns.
# =============================================================================
communication_client:
  pub:
    class: aiperf.zmq.pub_client:ZMQPubClient
    description: |
      ZMQ PUB client for publish-subscribe messaging pattern. Broadcasts messages
      to multiple subscribers with topic-based filtering support.

  pull:
    class: aiperf.zmq.pull_client:ZMQPullClient
    description: |
      ZMQ PULL client for pipeline messaging pattern. Receives messages from pushers
      in fair-queued fashion for work processing.

  push:
    class: aiperf.zmq.push_client:ZMQPushClient
    description: |
      ZMQ PUSH client for pipeline messaging pattern. Sends messages to workers in
      load-balanced fashion for distributed work distribution.

  reply:
    class: aiperf.zmq.router_reply_client:ZMQRouterReplyClient
    description: |
      ZMQ ROUTER client for request-reply messaging pattern. Receives commands and
      sends responses to specific requesters with identity-based routing.

  request:
    class: aiperf.zmq.dealer_request_client:ZMQDealerRequestClient
    description: |
      ZMQ DEALER client for request-reply messaging pattern. Sends commands and
      waits for responses with timeout support and retry logic.

  streaming_dealer:
    class: aiperf.zmq.streaming_dealer_client:ZMQStreamingDealerClient
    description: |
      ZMQ DEALER client for streaming messaging pattern. Provides high-throughput
      streaming with flow control and backpressure management.

  streaming_router:
    class: aiperf.zmq.streaming_router_client:ZMQStreamingRouterClient
    description: |
      ZMQ ROUTER client for streaming messaging pattern. Receives high-throughput
      streams with identity-based routing and connection management.

  streaming_push:
    class: aiperf.zmq.streaming_push_client:ZMQStreamingPushClient
    description: |
      ZMQ PUSH client that sends typed msgpack structs (the credit-channel wire,
      no Message-bus envelope). Send-only fan-out leg of the typed PUSH/PULL
      credit-return channel.

  streaming_pull:
    class: aiperf.zmq.streaming_pull_client:ZMQStreamingPullClient
    description: |
      ZMQ PULL client that decodes typed WorkerToRouterMessage structs. Recv-only
      fan-in leg of the typed PUSH/PULL credit-return channel.

  sub:
    class: aiperf.zmq.sub_client:ZMQSubClient
    description: |
      ZMQ SUB client for publish-subscribe messaging pattern. Receives broadcasts
      from publishers with topic filtering and subscription management.

# =============================================================================
# Public Dataset Loaders
# =============================================================================
# Public dataset loaders fetch shared benchmark datasets without requiring a
# local file. Selected via --public-dataset configuration option.
# =============================================================================
public_dataset_loader:
  exgentic:
    class: aiperf.dataset.loader.exgentic:ExgenticDatasetLoader
    description: |
      Exgentic agent LLM traces from HuggingFace. Replays complete recorded
      message and tool snapshots with recorded output limits. Fixed-schedule
      mode preserves call timestamps and overlaps; other modes replay sessions
      closed-loop with recorded inter-turn delays.
    metadata:
      hf_dataset_name: Exgentic/agent-llm-traces
      hf_split: train
      streaming: true
      has_timing_data: true

  sharegpt:
    class: aiperf.dataset.loader.sharegpt:ShareGPTLoader
    description: |
      ShareGPT dataset from HuggingFace. Downloads and processes the first
      prompt/completion pair from each conversation as a single-turn request.
      Filters entries by sequence length and token counts.

  aimo:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      AIMO NuminaMath-TIR math reasoning dataset from HuggingFace (AI-MO).
      Loads competition math problems as single-turn requests.
    metadata:
      hf_dataset_name: AI-MO/NuminaMath-TIR
      hf_split: train
      prompt_column: problem

  mmstar:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      MMStar multimodal visual QA benchmark from HuggingFace (Lin-Chen).
      Loads visual questions with images as single-turn requests.
    metadata:
      hf_dataset_name: Lin-Chen/MMStar
      hf_split: val
      prompt_column: question
      image_column: image

  mmvu:
    class: aiperf.dataset.loader.mmvu:MMVUDatasetLoader
    description: |
      MMVU expert-level video understanding benchmark from HuggingFace (yale-nlp).
      Loads video questions with video URLs as single-turn multimodal requests.
      Prompt combines the question with multiple-choice options (matching vLLM benchmark format).
    metadata:
      hf_dataset_name: yale-nlp/MMVU
      hf_split: validation
      video_column: video

  vision_arena:
    class: aiperf.dataset.loader.hf_conversation:HFConversationDatasetLoader
    description: |
      VisionArena multimodal chat dataset from HuggingFace (lmarena-ai).
      Loads the first user message and image as a single-turn vision request.
      Requires HuggingFace authentication.
    metadata:
      hf_dataset_name: lmarena-ai/VisionArena-Chat
      hf_split: train
      conversation_column: conversation
      message_content_key: content
      image_column: images
      streaming: true

  llava_onevision:
    class: aiperf.dataset.loader.hf_conversation:HFConversationDatasetLoader
    description: |
      LLaVA-OneVision multimodal instruction-following dataset from HuggingFace (lmms-lab).
      Loads the first user message and image as a single-turn vision request.
    metadata:
      hf_dataset_name: lmms-lab/LLaVA-OneVision-Data
      hf_split: train
      hf_subset: sharegpt4o
      conversation_column: conversations
      message_content_key: value
      image_column: image
      streaming: true

  aimo_aime:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      AIMO validation AIME competition problems from HuggingFace (AI-MO).
      Loads 90 AIME competition math problems as single-turn requests.
    metadata:
      hf_dataset_name: AI-MO/aimo-validation-aime
      hf_split: train
      prompt_column: problem

  aimo_numina_cot:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      NuminaMath chain-of-thought math reasoning dataset from HuggingFace (AI-MO).
      Loads competition math problems as single-turn requests.
    metadata:
      hf_dataset_name: AI-MO/NuminaMath-CoT
      hf_split: train
      prompt_column: problem

  aimo_numina_1_5:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      NuminaMath 1.5 math reasoning dataset from HuggingFace (AI-MO).
      Loads competition math problems as single-turn requests.
    metadata:
      hf_dataset_name: AI-MO/NuminaMath-1.5
      hf_split: train
      prompt_column: problem

  spec_bench:
    class: aiperf.dataset.loader.spec_bench:SpecBenchLoader
    description: |
      SpecBench speculative decoding benchmark dataset from GitHub (hemingkx).
      Loads single-turn questions for evaluating speculative decoding methods.

  # ---------------------------------------------------------------------------
  # Speculative-decoding acceptance-length benchmarks (auto-downloaded from HF).
  # These are the datasets the spec-decode literature reports acceptance length
  # against (GSM8K, MT-Bench, MATH-500, HumanEval, MBPP). Run each with
  # `--public-dataset spec_al_<name>` then `aiperf speed-bench-report ...
  # --metric accept_length`. Prompts are emitted bare; set greedy decoding with
  # `--extra-inputs temperature:0` to match the literature's headline numbers.
  # ---------------------------------------------------------------------------
  spec_al_gsm8k:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      GSM8K grade-school math word problems from HuggingFace (openai/gsm8k, main
      config, test split, 1319 prompts). Single-turn prompts for speculative
      decoding acceptance-length measurement. License: MIT.
    metadata:
      hf_dataset_name: openai/gsm8k
      hf_subset: main
      hf_split: test
      prompt_column: question

  spec_al_math500:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      MATH-500 competition math problems from HuggingFace (HuggingFaceH4/MATH-500,
      test split, 500 prompts). Single-turn prompts for speculative decoding
      acceptance-length measurement. License: MIT (inherited from Hendrycks MATH).
    metadata:
      hf_dataset_name: HuggingFaceH4/MATH-500
      hf_split: test
      prompt_column: problem

  spec_al_humaneval:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      HumanEval Python code-completion prompts from HuggingFace
      (openai/openai_humaneval, test split, 164 prompts). Single-turn prompts for
      speculative decoding acceptance-length measurement. The literature runs
      HumanEval as raw text completion; serving it through a chat template here
      shifts acceptance length away from the papers' headline numbers (MBPP shares
      this caveat to a lesser degree). License: MIT.
    metadata:
      hf_dataset_name: openai/openai_humaneval
      hf_split: test
      prompt_column: prompt

  spec_al_mbpp:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      MBPP basic Python programming tasks from HuggingFace
      (google-research-datasets/mbpp, full config, test split, 500 prompts).
      Single-turn prompts for speculative decoding acceptance-length measurement.
      License: CC-BY-4.0.
    metadata:
      hf_dataset_name: google-research-datasets/mbpp
      hf_subset: full
      hf_split: test
      prompt_column: text

  spec_al_mtbench:
    class: aiperf.dataset.loader.mt_bench:MTBenchDatasetLoader
    description: |
      MT-Bench two-turn chat prompts from HuggingFace (HuggingFaceH4/mt_bench_prompts,
      train split, 80 prompts). Multi-turn conversations for speculative decoding
      acceptance-length measurement. License: Apache-2.0.
    metadata:
      hf_dataset_name: HuggingFaceH4/mt_bench_prompts
      hf_split: train

  instruct_coder:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      InstructCoder code instruction dataset from HuggingFace (likaixin).
      Loads code generation instructions as single-turn requests.
    metadata:
      hf_dataset_name: likaixin/InstructCoder
      hf_split: train
      prompt_column: instruction

  blazedit_5k:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      Blazedit edit-distance benchmark dataset with ~5k character code contexts (vdaita).
      Prompts combine the code file and change request, matching vLLM's BlazeditDataset format.
    metadata:
      hf_dataset_name: vdaita/edit_5k_char
      hf_split: train
      prompt_column: change_request
      prompt_template: "Given a code file, please apply the change requests and generate the new file.\n\nOriginal file:\n```python\n{code}\n```\n\nChange request:\n{change_request}\n\nPlease generate the new code file in the \"New file\" section below."

  blazedit_10k:
    class: aiperf.dataset.loader.hf_instruction_response:HFInstructionResponseDatasetLoader
    description: |
      Blazedit edit-distance benchmark dataset with ~10k character code contexts (vdaita).
      Prompts combine the code file and change request, matching vLLM's BlazeditDataset format.
    metadata:
      hf_dataset_name: vdaita/edit_10k_char
      hf_split: train
      prompt_column: change_request
      prompt_template: "Given a code file, please apply the change requests and generate the new file.\n\nOriginal file:\n```python\n{code}\n```\n\nChange request:\n{change_request}\n\nPlease generate the new code file in the \"New file\" section below."

  # ---------------------------------------------------------------------------
  # ASR (Automatic Speech Recognition) datasets
  # ---------------------------------------------------------------------------
  librispeech:
    class: aiperf.dataset.loader.hf_asr:HFASRDatasetLoader
    description: |
      LibriSpeech ASR benchmark dataset (openslr). Clean read-speech clips from
      audiobooks. Uses the test.clean split by default.
    metadata:
      hf_dataset_name: openslr/librispeech_asr
      hf_split: test
      hf_subset: clean
      streaming: true
      audio_column: audio

  voxpopuli:
    class: aiperf.dataset.loader.hf_asr:HFASRDatasetLoader
    description: |
      VoxPopuli English ASR dataset (facebook). Unlabelled speech data from
      European Parliament recordings.
    metadata:
      hf_dataset_name: facebook/voxpopuli
      hf_split: test
      hf_subset: en
      audio_column: audio
      streaming: true

  gigaspeech:
    class: aiperf.dataset.loader.hf_asr:HFASRDatasetLoader
    description: |
      GigaSpeech English ASR dataset (speechcolab). Large-scale multi-domain
      corpus from audiobooks, podcasts, and YouTube. Requires HuggingFace authentication.
    metadata:
      hf_dataset_name: speechcolab/gigaspeech
      hf_split: test
      hf_subset: xs
      audio_column: audio
      streaming: true

  ami:
    class: aiperf.dataset.loader.hf_asr:HFASRDatasetLoader
    description: |
      AMI Meeting Corpus ASR dataset (Edinburgh CSTR). Meeting recordings with
      individual headset microphone audio. Public, no authentication required.
    metadata:
      hf_dataset_name: edinburghcstr/ami
      hf_split: test
      hf_subset: ihm
      audio_column: audio
      streaming: true

  spgispeech:
    class: aiperf.dataset.loader.hf_asr:HFASRDatasetLoader
    description: |
      SPGISpeech ASR dataset (Kensho). Financial earnings call recordings.
      Requires HuggingFace authentication and terms acceptance.
    metadata:
      hf_dataset_name: kensho/spgispeech
      hf_split: test
      hf_subset: test
      audio_column: audio
      streaming: true

# =============================================================================
# ZMQ Proxies
# =============================================================================
# ZMQ proxies provide message routing between different socket patterns.
# Internal infrastructure: automatically created by framework based on configuration.
# =============================================================================
zmq_proxy:
  dealer_router:
    class: aiperf.zmq.zmq_proxy_sockets:ZMQDealerRouterProxy
    description: |
      DEALER/ROUTER proxy for request-reply pattern. Routes messages between DEALER
      clients and ROUTER services with identity-based routing and response
      forwarding.

  push_pull:
    class: aiperf.zmq.zmq_proxy_sockets:ZMQPushPullProxy
    description: |
      PUSH/PULL proxy for pipeline pattern. Routes messages from PUSH clients to
      PULL services with load-balanced work distribution.

  xpub_xsub:
    class: aiperf.zmq.zmq_proxy_sockets:ZMQXPubXSubProxy
    description: |
      XPUB/XSUB proxy for publish-subscribe pattern. Routes messages from PUB
      clients to SUB services with subscription management and message broadcasting.

# =============================================================================
# Search Recipes
# =============================================================================
# Search recipes are named presets that compile to AdaptiveSearchSweep (BO) or
# sweep.parameters (grid) in the CLI converter (expand_search_recipe in
# aiperf/config/v1/_converter_optionals.py + _apply_recipe_sweep_parameters in
# aiperf/config/v1/converter.py).
# =============================================================================
search_recipe:
  max-throughput-ttft-sla:
    class: aiperf.search_recipes.builtins:MaxThroughputUnderTTFTSLA
    description: |
      Maximize output_token_throughput at the highest concurrency where p95 TTFT
      stays under --ttft-sla-ms. Bayesian-optimized over concurrency.
    metadata:
      algorithm: bayes
      sweep_path: phases.profiling.concurrency
  max-throughput-itl-sla:
    class: aiperf.search_recipes.builtins:MaxThroughputUnderITLSLA
    description: |
      Maximize output_token_throughput at the highest concurrency where p95 ITL
      stays under --itl-sla-ms. Bayesian-optimized over concurrency.
    metadata:
      algorithm: bayes
      sweep_path: phases.profiling.concurrency
  concurrency-ramp:
    class: aiperf.search_recipes.builtins:ConcurrencyRamp
    description: |
      Ramp concurrency log-spaced over [1, 1000] and detect the first concurrency
      where p99 request_latency degrades past baseline * (1 + --degradation-threshold).
    metadata:
      algorithm: grid
      sweep_path: phases.profiling.concurrency
  prefill-ttft-curve:
    class: aiperf.search_recipes.builtins:PrefillTTFTCurve
    description: |
      Sweep ISL log-spaced at concurrency=1; fit TTFT vs ISL with a linear
      regression (quadratic fallback when r^2 < 0.85).
    metadata:
      algorithm: grid
      sweep_path: benchmark.datasets.main.prompts.isl
  decode-itl-curve:
    class: aiperf.search_recipes.builtins:DecodeITLCurve
    description: |
      Sweep concurrency x OSL grid; fit ITL surface (axis-aligned grid with
      nulls for unmeasured cells) and emit decode_itl_surface.json.
    metadata:
      algorithm: grid
      sweep_path: benchmark.phases.profiling.concurrency,benchmark.datasets.main.prompts.osl
  max-concurrency-under-sla:
    class: aiperf.search_recipes.builtins:MaxConcurrencyUnderSLA
    description: |
      Find the highest concurrency where all SLA filters pass. Default
      smooth-isotonic 1D SLA-saturation search; use
      --search-style {smooth_isotonic|monotonic|bo|optuna|grid}. Closes
      GitHub issue #883.
    metadata:
      algorithm: smooth_isotonic
      sweep_path: phases.profiling.concurrency
  pareto-sweep:
    class: aiperf.search_recipes.builtins:ParetoSweep
    description: |
      Sweep paired ISL/OSL workload shapes across a concurrency list; emit
      a Pareto frontier (request_latency p95 vs output_token_throughput avg).
      Closes GitHub issue #874.
  max-goodput-under-slo:
    class: aiperf.search_recipes.builtins:MaxGoodputUnderSLO
    description: |
      Maximize goodput at the highest concurrency where >=X% of requests satisfy
      simultaneous TTFT/TPOT/E2E per-request SLOs. Bayesian-optimized; canonical
      DistServe formulation. Requires --ttft-sla-ms, --tpot-sla-ms, --e2e-sla-ms;
      attainment fraction defaults to 0.95.
    metadata:
      algorithm: bayes
      sweep_path: phases.profiling.concurrency

# =============================================================================
# Search Recipe Post-Process Handlers
# =============================================================================
# Handlers run after SweepAnalyzer.compute() in aggregate_sweep_and_export and
# emit derived artifacts (curves, knee points) into sweep_aggregate/. Selected
# indirectly via a recipe's PostProcessSpec.
# =============================================================================
search_recipe_post_process:
  degradation_knee_detect:
    class: aiperf.search_recipes.post_process:DegradationKneeDetect
    description: |
      Find the first swept value where the chosen metric exceeds
      baseline * (1 + threshold_pct). Used by the concurrency-ramp recipe.
  pareto_sweep_export:
    class: aiperf.search_recipes.post_process:ParetoSweepExport
    description: |
      Emit a Pareto-frontier JSON artifact for the pareto-sweep recipe.
      Marks each (isl, osl, concurrency) cell with a pareto_optimal flag.
  ttft_curve_fit:
    class: aiperf.search_recipes.post_process:TTFTCurveFit
    description: |
      Fit TTFT vs ISL with linear regression; refit quadratic when r^2 is
      below the configured floor (default 0.85). Used by the
      prefill-ttft-curve recipe.
  itl_surface_fit:
    class: aiperf.search_recipes.post_process:ItlSurfaceFit
    description: |
      Build an axis-aligned ITL(concurrency, OSL) surface from a 2D grid
      sweep. Emits raw points + grid with nulls for unmeasured cells. Used
      by the decode-itl-curve recipe.
  sla_breach_knee:
    class: aiperf.search_recipes.post_process:SLABreachKnee
    description: |
      Locate the SLA feasibility boundary along a swept parameter and emit
      max_passing / first_failing values plus per-point breach detail. Used
      by the max-concurrency-under-sla grid path.

# =============================================================================
# Convergence Criteria
# =============================================================================
# Convergence criteria decide when adaptive multi-run trials can stop because
# the chosen metric has stabilized across repeated runs.
# =============================================================================
convergence_criterion:
  ci_width:
    class: aiperf.orchestrator.convergence.ci_width:CIWidthConvergence
    description: |
      Stops when Student's t confidence interval width relative to the metric
      mean falls below `--convergence-threshold` (default 0.10 = 10%). Reads
      `--confidence-level` (default 0.95).
    metadata:
      min_samples: 3
      requires_confidence_level: true
      requires_jsonl_export: false
      metric_kinds: [continuous]

  cv:
    class: aiperf.orchestrator.convergence.cv:CVConvergence
    description: |
      Stops when the coefficient of variation across run-level statistic values
      falls below `--convergence-threshold` (default 0.05 = 5%).
    metadata:
      min_samples: 3
      requires_confidence_level: false
      requires_jsonl_export: false
      metric_kinds: [continuous]

  distribution:
    class: aiperf.orchestrator.convergence.distribution:DistributionConvergence
    description: |
      Stops when a two-sample Kolmogorov-Smirnov test between the latest run's
      per-request distribution and the union of prior runs yields p > threshold.
      Requires JSONL export (`--export-format json`).
    metadata:
      min_samples: 3
      requires_confidence_level: false
      requires_jsonl_export: true
      metric_kinds: [continuous]

# =============================================================================
# Search Planners
# =============================================================================
# Search planners drive the adaptive outer loop, proposing the next variation
# via ask() and absorbing observed metrics via tell().
# =============================================================================
search_planner:
  bayesian:
    class: aiperf.orchestrator.search_planner.bayesian:BayesianSearchPlanner
    description: |
      Curated adaptive-search preset. Subclass of OptunaSearchPlanner that
      uses the optional BoTorch sampler when available, selecting
      `optuna_acquisition=qlognei` (single-objective) or
      `optuna_acquisition=qlognehvi` (multi-objective) automatically. When the
      optional BoTorch stack is unavailable, the preset logs a warning and
      falls back to Optuna's core TPE sampler so adaptive search still works
      from the default install. Under `--search-planner=optuna`, the same
      fallback applies only when BoTorch was implicit; explicit BoTorch sampler
      requests raise when the optional stack is unavailable.
    metadata:
      supports_continuous: true
      supports_discrete: true
      supports_categorical: false
      requires_initial_samples: 5
      compatible_objective_directions: [maximize, minimize]
      requires_extras: []
  monotonic_sla:
    class: aiperf.orchestrator.search_planner.monotonic:MonotonicSLASearchPlanner
    description: |
      1D-optimized exponential-probe + bisection planner for SLA-saturation
      search. Mirrors perf_analyzer's `--binary-search`. O(log N) versus BO's
      O(N) on 1D feasibility-only problems. Requires exactly one integer
      search-space dimension and at least one SLA filter; rejects
      multi-dimensional or empty-filter configs at construction. No
      heavy dependencies.
    metadata:
      supports_continuous: false
      supports_discrete: true
      supports_categorical: false
      requires_initial_samples: 0
      compatible_objective_directions: [maximize, minimize]
      requires_extras: []
  smooth_isotonic:
    class: aiperf.orchestrator.search_planner.smooth_isotonic:SmoothIsotonicSLAPlanner
    description: |
      1D smooth-isotonic SLA-saturation planner. Composition: PAVA denoises
      noisy probe margins, PCHIP interpolates the denoised points, root-find
      recovers the saturation boundary. Strictly more accurate than
      monotonic_sla under noise; opt-in Phase-3 replicates (via
      --sla-replicates) bound the boundary with a bootstrap CI. Cliff guard
      reports `boundary_type: cliff` for prefill-prioritizing servers where
      the curve is genuinely discontinuous. Same dependency footprint as
      monotonic_sla — only scipy (already required).
    metadata:
      supports_continuous: false
      supports_discrete: true
      supports_categorical: false
      requires_initial_samples: 0
      compatible_objective_directions: [maximize, minimize]
      requires_extras: []
  optuna:
    class: aiperf.orchestrator.search_planner.optuna_planner:OptunaSearchPlanner
    description: |
      Optuna-backed adaptive outer-loop planner with explicit sampler and
      acquisition selection. Default sampler is `TPESampler` (Optuna 3.0+
      native constraints, ships with Optuna core). `GPSampler` is
      selectable via `--optuna-sampler gp` for native GP-EI
      semantics with native inequality constraints (Optuna 4.2+).
      `BoTorchSampler` is selectable via `--optuna-sampler botorch` for
      modern qLogNEI / qLogNEHVI acquisitions; when this sampler is
      chosen, the GP surrogate uses the Hvarfner-DSP Matern-5/2 kernel
      (arXiv:2402.02229) automatically. Power-user entry point;
      `--search-planner=bayesian` is the curated alternative for users
      who don't want to choose sampler/acquisition. Optuna core is installed
      by default; BoTorch requires the optional `botorch` extra.
    metadata:
      supports_continuous: true
      supports_discrete: true
      supports_categorical: false
      requires_initial_samples: 5
      compatible_objective_directions: [maximize, minimize]
      requires_extras: []
