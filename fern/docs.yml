# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: aiperf.docs.buildwithfern.com/aiperf
    custom-domain: https://docs.nvidia.com/aiperf

title: NVIDIA AIPerf Documentation

products:
  - display-name: AIPerf
    slug: /
    path: ../docs/index.yml
    versions:
      - display-name: dev
        path: ../docs/index.yml

global-theme: nvidia

redirects:
  - source: "/aiperf/index.html"
    destination: "/aiperf/"
  - source: "/aiperf/dev/index.html"
    destination: "/aiperf/dev/"

navbar-links:
  - type: github
    value: https://github.com/ai-dynamo/aiperf

footer: ./components/CustomFooter.tsx
layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

metadata:
  canonical-host: "docs.nvidia.com/aiperf"

experimental:
  mdx-components:
    - ./components
  basepath-aware: true
colors:
  accentPrimary:
    dark: '#76B900'
    light: '#76B900'
  background:
    light: '#FFFFFF'
    dark: '#000000'
typography:
  bodyFont:
    name: NVIDIA
    paths:
      - path: ./assets/fonts/NVIDIASans.woff2
        style: normal
      - path: ./assets/fonts/NVIDIASans_Italic.woff2
        style: italic
  codeFont:
    name: RobotoMono
    paths:
      - path: ./assets/fonts/RobotoMono.woff2
theme:
  page-actions: toolbar
  footer-nav: minimal
logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /
  right-text: Documentation
favicon: ./assets/NVIDIA_symbol.svg
js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive
css:
  - ./main.css
