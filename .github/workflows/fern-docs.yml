# Consolidated Fern Documentation Workflow
#
# This workflow handles all Fern documentation automation:
#
# 1. LINT (PRs): Validates Fern configuration and checks for broken links
#    - Triggers on PRs when docs/** or fern/** files change
#    - Runs `fern check` and `fern docs broken-links`
#
# 2. VALIDATE & PUBLISH: Syncs docs/ from source branch to fern/ on docs-website,
#    validates the synced content, and on main publishes via `fern generate --docs`
#    - Triggers on push to main or PRs when docs/** or fern/** files change
#    - On main: commits and pushes to docs-website, then publishes via `fern generate --docs`
#    - On PRs: only validates (preview lives in a separate, non-blocking job)
#    - Preserves versioned documentation (products[0]) from docs-website's docs.yml
#
# 3. PREVIEW (non-blocking): Generates a preview URL and comments on the PR.
#    - A small `preview-context` job decides whether the actual `preview-docs`
#      job should run for this event, then `preview-docs` does the work.
#    - The `Generate docs preview` step never `exit 1`s — failures emit a
#      ::warning:: and the comment step posts a "preview unavailable" message
#      instead. continue-on-error stays as belt-and-suspenders for any other
#      unexpected failure (sync, network, rate limit at sync time, etc.).
#    - On same-repo PRs: runs on the `pull_request` event with FERN_TOKEN.
#    - On fork PRs: skipped on `pull_request` (no secrets in untrusted
#      context); re-runs on push to `pull-request/<N>` after a maintainer
#      approves the PR via copy-pr-bot (`/ok to test`). The mirror branch is
#      in the trusted org repo, so it gets FERN_TOKEN and posts the preview
#      URL back to the original PR.
#    - On un-mirrored fork PRs: simply skipped — no fake yellow check on the PR.
#    - On same-repo PRs that copy-pr-bot also mirrors: the mirror push event
#      is skipped (the original `pull_request` already ran preview).
#
# 4. VERSION RELEASE (tags): Creates versioned documentation snapshot
#    - Triggers on new version tags (vX.Y.Z format)
#    - Creates fern/pages-vX.Y.Z/ directory on docs-website branch
#    - Updates fern/docs.yml with new version entry
#    - Publishes docs to Fern after releasing
#
# Note: The publish step is included inline because pushes made with GITHUB_TOKEN
# do not trigger other workflows (GitHub's anti-recursion guard), so we cannot
# rely on a separate publish workflow for bot-initiated pushes.

name: Fern Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'fern/**'
      # Self-validate when the workflow itself is edited.
      - '.github/workflows/fern-docs.yml'
  push:
    branches:
      - main
      # copy-pr-bot mirror branches for fork PRs; pushes here run in trusted
      # context with FERN_TOKEN, letting `preview-docs` generate previews for
      # fork PRs after a maintainer approves via `/ok to test`.
      - 'pull-request/*'
    tags:
      # Match only clean semver tags: vX.Y.Z
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g., v0.9.0). Leave empty to sync dev docs.'
        required: false
        type: string
      force_rebuild:
        description: 'Overwrite an already-released version snapshot (manual dispatch only). Use with care: it replaces pages-$TAG and versions/$TAG.yml, reverting any out-of-band manual corrections.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  #############################################################################
  # LINT JOBS - Run on PRs when docs/** or fern/** files change
  #############################################################################

  docs-index-check:
    name: Docs Index Completeness Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check all docs are listed in index.yml
        run: python tools/check_docs_index.py


  #############################################################################
  # VALIDATE & PUBLISH - Syncs docs content to docs-website structure and
  # validates the result. On main: commits, pushes, and publishes via
  # `fern generate --docs`. On PRs: validation only — preview is a separate,
  # non-blocking job below so flaky preview failures don't gate PR merges.
  #############################################################################

  validate-and-publish-docs:
    name: Validate (and publish on main) synced docs
    if: |
      github.ref_type != 'tag' &&
      (github.event.inputs.tag == '' || github.event.inputs.tag == null) &&
      !(github.event_name == 'push' && startsWith(github.ref, 'refs/heads/pull-request/'))
    runs-on: ubuntu-latest
    steps:
      - name: Determine context
        id: ctx
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          path: source-checkout
          fetch-depth: 1

      - name: Checkout docs-website branch
        uses: actions/checkout@v6
        with:
          ref: docs-website
          path: docs-checkout
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dev content from main
        run: |
          # Sync content directories from docs/ to fern/pages-dev/ on docs-website
          echo "Syncing content pages to docs-website branch..."
          rm -rf docs-checkout/fern/pages-dev
          mkdir -p docs-checkout/fern/pages-dev
          rsync -a \
            --exclude='index.yml' \
            source-checkout/docs/ docs-checkout/fern/pages-dev/

          # Sync index.yml as versions/dev.yml and transform paths for docs-website layout
          echo "Syncing index.yml to docs-website branch as versions/dev.yml..."
          cp source-checkout/docs/index.yml docs-checkout/fern/versions/dev.yml

          # Sync fern.config.json
          echo "Syncing fern.config.json to docs-website branch..."
          cp source-checkout/fern/fern.config.json docs-checkout/fern/fern.config.json

          # Sync .gitignore if it exists
          if [ -f source-checkout/fern/.gitignore ]; then
            cp source-checkout/fern/.gitignore docs-checkout/fern/.gitignore
          fi

          # Sync md_to_mdx.py script (required — fail fast if missing)
          cp source-checkout/fern/md_to_mdx.py docs-checkout/fern/md_to_mdx.py

          # Sync components/ directory (e.g., CustomFooter.tsx)
          if [ -d source-checkout/fern/components ]; then
            echo "Syncing components/ to docs-website branch..."
            rm -rf docs-checkout/fern/components
            cp -r source-checkout/fern/components docs-checkout/fern/components
          fi

          # Sync main.css
          if [ -f source-checkout/fern/main.css ]; then
            echo "Syncing main.css to docs-website branch..."
            cp source-checkout/fern/main.css docs-checkout/fern/main.css
          fi

      - name: Transform paths in dev.yml for docs-website layout
        run: |
          # In the source repo, index.yml uses paths relative to docs/ (e.g. tutorials/openai-text-endpoints.md).
          # On docs-website, fern/versions/dev.yml needs ../pages-dev/ prefix.
          yq -i '(.. | select(has("path")).path) |= sub("^([a-zA-Z])", "../pages-dev/${1}")' docs-checkout/fern/versions/dev.yml

      - name: Convert Markdown to Fern MDX format
        run: |
          echo "Converting GitHub Markdown to Fern MDX format in pages-dev/..."
          python3 docs-checkout/fern/md_to_mdx.py --dir docs-checkout/fern/pages-dev
          echo "Conversion complete."

      - name: Update docs.yml preserving products
        run: |
          cd docs-checkout/fern

          # Save the full products[0] block from docs-website (versions, path, etc.)
          yq '.products[0]' docs.yml > /tmp/preserved_product.yml

          echo "Preserved products[0] block:"
          cat /tmp/preserved_product.yml

          # Copy docs.yml from source to get config updates (redirects, layout, etc.)
          cp ../../source-checkout/fern/docs.yml docs.yml

          # Restore the preserved products[0] block
          yq -i '.products[0] = load("/tmp/preserved_product.yml")' docs.yml

          echo "Updated docs.yml:"
          cat docs.yml

      - name: Setup Node.js for Fern validation
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Fern CLI for validation
        run: npm install -g fern-api@$(jq -r '.version' docs-checkout/fern/fern.config.json)

      - name: Validate transformed Fern content
        working-directory: docs-checkout
        run: fern check

      - name: Validate transformed Fern content (strict)
        working-directory: docs-checkout
        run: fern check --warnings --strict-broken-links

      - name: Check for broken links in transformed content
        working-directory: docs-checkout
        run: fern docs broken-links

      - name: Check for changes
        id: changes
        run: |
          cd docs-checkout
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status --short
          fi

      - name: Setup Git
        if: steps.ctx.outputs.is_main == 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          cd docs-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        if: steps.ctx.outputs.is_main == 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          cd docs-checkout

          git add -A
          git commit -m "docs(fern): sync dev from main

          Automated sync of docs/ directory from main branch.
          Preserves versioned documentation snapshots.

          Source commit: ${{ github.sha }}"

          git push origin docs-website

          echo "Successfully synced dev docs to docs-website branch"

      - name: Publish Docs
        if: steps.ctx.outputs.is_main == 'true' && (steps.changes.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch')
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        working-directory: docs-checkout/fern
        run: fern generate --docs

  #############################################################################
  # PREVIEW CONTEXT - resolves the PR number and decides whether `preview-docs`
  # should run for this event. Always succeeds (it's just a lookup job), so
  # it stays out of the way of branch protection. preview-docs `needs:` this.
  #
  # Decision logic:
  #   - same-repo PR on `pull_request`: run (has FERN_TOKEN).
  #   - fork PR on `pull_request`: skip (no secrets in untrusted context;
  #     copy-pr-bot will mirror after `/ok to test` and we'll catch the push).
  #   - mirror push (`pull-request/<N>`) for a fork PR: run (trusted context).
  #   - mirror push for a same-repo PR: skip (the original `pull_request`
  #     event already ran preview — avoids duplicate preview generation).
  #############################################################################

  preview-context:
    name: Preview docs context
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/pull-request/'))
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      pr_number: ${{ steps.decide.outputs.pr_number }}
    steps:
      - name: Decide whether preview should run
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="$PR_NUMBER_FROM_EVENT"
            HEAD_REPO="$PR_HEAD_REPO"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_NUMBER="${BRANCH#pull-request/}"
            # Surface lookup failures rather than silently routing as same-repo
            # (which would skip the preview entirely, leaving no PR comment).
            if ! HEAD_REPO=$(gh api "/repos/$REPO/pulls/$PR_NUMBER" --jq '.head.repo.full_name'); then
              echo "::error::Unable to resolve head repo for PR #$PR_NUMBER — preview routing failed"
              exit 1
            fi
          fi

          SHOULD_RUN=false
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPO" = "$REPO" ]; then
            SHOULD_RUN=true
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$REPO" ]; then
            SHOULD_RUN=true
          fi

          echo "Resolved PR #$PR_NUMBER (head=$HEAD_REPO) should_run=$SHOULD_RUN"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  #############################################################################
  # PREVIEW (non-blocking) - Generates a preview URL and comments on the PR.
  # Skipped entirely when preview-context says it shouldn't run, so the only
  # check that ever appears on a PR is the matching one (no fake yellow). The
  # actual preview-generate step never `exit 1`s — failures emit a warning,
  # set no URL output, and the comment step posts a "preview unavailable"
  # message instead. continue-on-error stays as belt-and-suspenders for any
  # other unexpected failure (sync, network, rate limit at sync time, etc.).
  #############################################################################

  preview-docs:
    name: Preview docs (non-blocking)
    needs: preview-context
    if: needs.preview-context.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v6
        with:
          path: source-checkout
          fetch-depth: 1

      - name: Checkout docs-website branch
        uses: actions/checkout@v6
        with:
          ref: docs-website
          path: docs-checkout
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync dev content from source
        run: |
          # Sync content directories from docs/ to fern/pages-dev/ on docs-website
          rm -rf docs-checkout/fern/pages-dev
          mkdir -p docs-checkout/fern/pages-dev
          rsync -a \
            --exclude='index.yml' \
            source-checkout/docs/ docs-checkout/fern/pages-dev/

          # Sync index.yml as versions/dev.yml and transform paths for docs-website layout
          cp source-checkout/docs/index.yml docs-checkout/fern/versions/dev.yml

          # Sync fern.config.json
          cp source-checkout/fern/fern.config.json docs-checkout/fern/fern.config.json

          # Sync .gitignore if it exists
          if [ -f source-checkout/fern/.gitignore ]; then
            cp source-checkout/fern/.gitignore docs-checkout/fern/.gitignore
          fi

          # Sync md_to_mdx.py script (required — fail fast if missing)
          cp source-checkout/fern/md_to_mdx.py docs-checkout/fern/md_to_mdx.py

          # Sync components/ directory (e.g., CustomFooter.tsx)
          if [ -d source-checkout/fern/components ]; then
            rm -rf docs-checkout/fern/components
            cp -r source-checkout/fern/components docs-checkout/fern/components
          fi

          # Sync main.css
          if [ -f source-checkout/fern/main.css ]; then
            cp source-checkout/fern/main.css docs-checkout/fern/main.css
          fi

      - name: Transform paths in dev.yml for docs-website layout
        run: |
          yq -i '(.. | select(has("path")).path) |= sub("^([a-zA-Z])", "../pages-dev/${1}")' docs-checkout/fern/versions/dev.yml

      - name: Convert Markdown to Fern MDX format
        run: python3 docs-checkout/fern/md_to_mdx.py --dir docs-checkout/fern/pages-dev

      - name: Update docs.yml preserving products
        run: |
          cd docs-checkout/fern
          yq '.products[0]' docs.yml > /tmp/preserved_product.yml
          cp ../../source-checkout/fern/docs.yml docs.yml
          yq -i '.products[0] = load("/tmp/preserved_product.yml")' docs.yml

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r '.version' docs-checkout/fern/fern.config.json)

      - name: Check for changes
        id: changes
        run: |
          cd docs-checkout
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate docs preview
        if: steps.changes.outputs.has_changes == 'true'
        id: preview
        working-directory: docs-checkout/fern
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: |
          # Never `exit 1` here — preview is best-effort. On failure we emit a
          # ::warning::, set `status=failed`, and let the comment step post a
          # "preview unavailable" message. On success we set `status=success`
          # plus the URL. This keeps the job genuinely green.
          if OUTPUT=$(fern generate --docs --preview 2>&1); then
            FERN_EXIT=0
          else
            FERN_EXIT=$?
          fi
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'Published docs to \K\S+') || true
          if [ -n "$URL" ]; then
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Fern docs preview generation failed (exit $FERN_EXIT) — preview will be unavailable for this run."
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment preview status on PR
        # Run on success or failure of preceding steps, but skip the comment
        # entirely when the preview step itself was skipped (has_changes=false)
        # so we don't post a misleading "preview unavailable" on doc-untouched
        # synced runs. Early-step failures (sync/checkout) are covered by
        # validate-and-publish-docs being red, so no comment needed there either.
        if: always() && steps.preview.outputs.status != ''
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.preview-context.outputs.pr_number }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const url = process.env.PREVIEW_URL;
            const runUrl = process.env.RUN_URL;
            const commentIdentifier = '<!-- fern-docs-preview -->';
            const body = url
              ? `${commentIdentifier}\n**Fern Docs Preview:** ${url}/dev`
              : `${commentIdentifier}\n**Fern Docs Preview:** generation failed — see the [Actions log](${runUrl}) for details. This does not block merge; ask a maintainer to retry if needed.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(commentIdentifier)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

  #############################################################################
  # VERSION RELEASE - Run on new version tags (vX.Y.Z)
  #############################################################################

  release-version:
    name: Release Version to docs-website
    # Run on tag push OR manual dispatch with a tag specified
    if: |
      github.ref_type == 'tag' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' && github.event.inputs.tag != null)
    runs-on: ubuntu-latest
    steps:
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          # Validate tag format (must be vX.Y.Z exactly)
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: $TAG. Must be vX.Y.Z (e.g., v0.9.0)"
            exit 1
          fi

          # Extract version without 'v' prefix
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Processing version: $VERSION (tag: $TAG)"

      - name: Checkout source at tag
        uses: actions/checkout@v6
        with:
          # Explicit tag ref so workflow_dispatch (which runs on a branch)
          # resolves the tag rather than the dispatch ref. Provides the tagged
          # commit's docs/ (incl. docs/index.yml) and fern/md_to_mdx.py.
          ref: ${{ steps.version.outputs.tag }}
          path: source-checkout
          fetch-depth: 1

      - name: Checkout docs-website branch
        uses: actions/checkout@v6
        with:
          ref: docs-website
          path: docs-checkout
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version already exists
        env:
          # Empty on tag-push events; "true"/"false" only on workflow_dispatch.
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if [ -d "docs-checkout/fern/pages-$TAG" ] || [ -f "docs-checkout/fern/versions/$TAG.yml" ]; then
            if [ "$FORCE_REBUILD" = "true" ]; then
              echo "::warning::Version $TAG already exists; force_rebuild=true, overwriting its snapshot (any out-of-band manual corrections will be replaced)."
            else
              echo "::error::Version $TAG already exists. Re-run via workflow_dispatch with force_rebuild=true to overwrite it intentionally."
              exit 1
            fi
          else
            echo "Version $TAG does not exist yet, proceeding with release"
          fi

      - name: Setup Git
        working-directory: docs-checkout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build versioned pages from tagged commit
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          echo "Building docs-checkout/fern/pages-$TAG/ from source @ $TAG docs/..."

          # Build the snapshot from the tag's raw docs/, not from pages-dev.
          # pages-dev tracks main and would capture the wrong content under a
          # version label (tags are cut from release/X.Y.Z branches that diverge
          # from main). Because the source is raw markdown (not already-converted
          # MDX), the later md_to_mdx.py pass converts exactly once.
          rm -rf "docs-checkout/fern/pages-$TAG"
          mkdir -p "docs-checkout/fern/pages-$TAG"
          rsync -a --exclude='index.yml' \
            source-checkout/docs/ "docs-checkout/fern/pages-$TAG/"

          echo "Created docs-checkout/fern/pages-$TAG/"
          ls -la "docs-checkout/fern/pages-$TAG/" | head -20

      - name: Update GitHub links to version tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          echo "Pinning GitHub links from main to $TAG in docs-checkout/fern/pages-$TAG/..."

          # Pin tree/main and blob/main links to this version's tag, on raw
          # markdown before MDX conversion.
          find "docs-checkout/fern/pages-$TAG" -name "*.md" -o -name "*.mdx" | while read file; do
            if grep -q "github.com/ai-dynamo/aiperf/tree/main" "$file"; then
              echo "Updating tree links: $file"
              sed -i "s|github.com/ai-dynamo/aiperf/tree/main|github.com/ai-dynamo/aiperf/tree/$TAG|g" "$file"
            fi
          done

          # Also update blob/main references (for direct file links)
          find "docs-checkout/fern/pages-$TAG" -name "*.md" -o -name "*.mdx" | while read file; do
            if grep -q "github.com/ai-dynamo/aiperf/blob/main" "$file"; then
              echo "Updating blob links: $file"
              sed -i "s|github.com/ai-dynamo/aiperf/blob/main|github.com/ai-dynamo/aiperf/blob/$TAG|g" "$file"
            fi
          done

          echo "GitHub link update complete."

      - name: Convert Markdown to Fern MDX format
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          echo "Converting Markdown to Fern MDX in pages-$TAG/ with the tag's md_to_mdx.py..."
          # Use the tagged commit's converter for fidelity to that release's
          # pipeline (source is raw markdown, so this converts exactly once).
          python3 source-checkout/fern/md_to_mdx.py --dir "docs-checkout/fern/pages-$TAG"
          echo "Conversion complete."

      - name: Create version config file
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_FILE="docs-checkout/fern/versions/$TAG.yml"

          echo "Creating version config from the tag's index.yml: $VERSION_FILE"

          # Navigation must come from the tag's index.yml so it references the
          # pages that actually exist in pages-$TAG.
          cp source-checkout/docs/index.yml "$VERSION_FILE"

          # Transform paths for the docs-website layout, pinned to this version
          # (same transform validate-and-publish applies to dev.yml, with the
          # ../pages-$TAG/ prefix instead of ../pages-dev/).
          yq -i '(.. | select(has("path")).path) |= sub("^([a-zA-Z])", "../pages-'"$TAG"'/${1}")' "$VERSION_FILE"

          echo "Created $VERSION_FILE"
          echo "First 30 lines:"
          head -30 "$VERSION_FILE"

      - name: Update docs.yml with new version
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DOCS_FILE="docs-checkout/fern/docs.yml"

          echo "Updating $DOCS_FILE to include $TAG..."

          # Check if version already in docs.yml
          if yq -e ".products[0].versions[] | select(.\"display-name\" == \"$TAG\")" "$DOCS_FILE" > /dev/null 2>&1; then
            echo "Version $TAG already in docs.yml, skipping update"
            exit 0
          fi

          # Find the index of the "dev" entry and insert new version right after it
          DEV_IDX=$(yq '.products[0].versions | to_entries | map(select(.value."display-name" == "dev")) | .[0].key' "$DOCS_FILE")
          INSERT_IDX=$((DEV_IDX + 1))

          yq -i "
            .products[0].versions |= (
              .[:$INSERT_IDX] +
              [{\"display-name\": \"$TAG\", \"path\": \"./versions/$TAG.yml\", \"slug\": \"$TAG\", \"availability\": \"stable\"}] +
              .[$INSERT_IDX:]
            )
          " "$DOCS_FILE"

          # Update the top-level entry to point to the new version
          yq -i ".products[0].path = \"./versions/$TAG.yml\"" "$DOCS_FILE"

          # Update the "Latest" entry to point to the new version
          yq -i ".products[0].versions[0].path = \"./versions/$TAG.yml\"" "$DOCS_FILE"
          yq -i ".products[0].versions[0].display-name = \"Latest ($TAG)\"" "$DOCS_FILE"
          yq -i ".products[0].versions[0].slug = \"latest\"" "$DOCS_FILE"
          yq -i ".products[0].versions[0].availability = \"stable\"" "$DOCS_FILE"

          echo "Updated docs.yml products/versions section:"
          yq '.products[0].versions' "$DOCS_FILE"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r '.version' docs-checkout/fern/fern.config.json)

      - name: Validate release snapshot (strict)
        working-directory: docs-checkout
        run: |
          # Fail the release before commit/publish if the tag's converter
          # produced output the site renderer rejects, or any link is broken.
          # Validates the whole site (all versions); pre-existing broken
          # snapshots must be clean (fixed manually) or the release is blocked.
          fern check --warnings --strict-broken-links
          fern docs broken-links

      - name: Commit and push changes
        working-directory: docs-checkout
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git add "fern/pages-$TAG/"
          git add "fern/versions/$TAG.yml"
          git add fern/docs.yml

          git commit -m "docs(fern): release version $TAG

          - Created fern/pages-$TAG/ with documentation snapshot
          - Created fern/versions/$TAG.yml version navigation config
          - Updated fern/docs.yml to include $TAG in version list

          Automated by fern-docs workflow
          Source tag: $TAG"

          git push origin docs-website

          echo "Successfully released documentation for $TAG on docs-website branch"

      - name: Publish Docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        working-directory: docs-checkout/fern
        run: fern generate --docs
